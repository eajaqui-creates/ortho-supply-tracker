<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Ortho Supply Tracker</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#F8F9FB;color:#1A1D25}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:3px}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useMemo,useCallback,useEffect,useRef}=React;
const{BarChart,Bar,XAxis,YAxis,Tooltip,ResponsiveContainer,PieChart,Pie,Cell,Legend,CartesianGrid}=Recharts;

// ─── SVG Icons ───────────────────────────────────────────────────────
const icons={
  dashboard:"M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z",
  package:"M16.5 9.4l-9-5.19M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z",
  briefcase:"M20 7H4a2 2 0 00-2 2v10a2 2 0 002 2h16a2 2 0 002-2V9a2 2 0 00-2-2zM16 21V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v16",
  clipboard:"M16 4h2a2 2 0 012 2v14a2 2 0 01-2 2H6a2 2 0 01-2-2V6a2 2 0 012-2h2M9 2h6a1 1 0 011 1v1a1 1 0 01-1 1H9a1 1 0 01-1-1V3a1 1 0 011-1z",
  dollar:"M12 1v22M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6",
  settings:"M12 15a3 3 0 100-6 3 3 0 000 6zM19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z",
  alert:"M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0zM12 9v4M12 17h.01",
  search:"M11 19a8 8 0 100-16 8 8 0 000 16zM21 21l-4.35-4.35",
  x:"M18 6L6 18M6 6l12 12",
  plus:"M12 5v14M5 12h14",
  download:"M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3",
  database:"M12 2C6.48 2 2 4.02 2 6.5v11C2 19.98 6.48 22 12 22s10-2.02 10-4.5v-11C22 4.02 17.52 2 12 2zM2 6.5C2 8.98 6.48 11 12 11s10-2.02 10-4.5M2 12c0 2.48 4.48 4.5 10 4.5s10-2.02 10-4.5",
  mappin:"M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0zM12 13a3 3 0 100-6 3 3 0 000 6z",
  cart:"M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6",
  check2:"M20 6L9 17l-5-5",
  packcheck:"M16.5 9.4l-9-5.19M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16zM7.5 4.21l9 5.2M3.29 7L12 12M12 22V12M9 17l3-3 5 5",
  menu:"M3 12h18M3 6h18M3 18h18",
  bell:"M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 01-3.46 0",
  checkcircle:"M22 11.08V12a10 10 0 11-5.93-9.14M22 4L12 14.01l-3-3",
  clock:"M12 22a10 10 0 100-20 10 10 0 000 20zM12 6v6l4 2",
  xcircle:"M12 22a10 10 0 100-20 10 10 0 000 20zM15 9l-6 6M9 9l6 6",
  pencil:"M17 3a2.83 2.83 0 114 4L7.5 20.5 2 22l1.5-5.5z",
  trash:"M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2",
  save:"M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2zM17 21v-8H7v8M7 3v5h8",
  filedown:"M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8zM14 2v6h6M12 18v-6M9 15l3 3 3-3",
  fileup:"M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8zM14 2v6h6M12 12v6M15 15l-3-3-3 3",
  loader:"M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83",
  store:"M3 9l9-7 9 7M9 22V12h6v10M3 9v11a2 2 0 002 2h14a2 2 0 002-2V9",
  calclock:"M12 22a10 10 0 100-20 10 10 0 000 20zM12 6v6l3 3",
};
function I({name,size=18,color="currentColor",style={}}){
  return React.createElement("svg",{width:size,height:size,viewBox:"0 0 24 24",fill:"none",stroke:color,strokeWidth:2,strokeLinecap:"round",strokeLinejoin:"round",style:{flexShrink:0,...style}},
    React.createElement("path",{d:icons[name]||icons.package}));
}

// ─── Constants ───────────────────────────────────────────────────────
const EMPTY_DATA={items:[],inventory:[],orders:[],vendors:[],nextItemId:1,nextVendorId:1};
const SK="ortho-supply-tracker-data";
const C={bg:"#F8F9FB",sidebar:"#0F1729",sideActive:"#243352",accent:"#0EA5A0",accentLight:"#E6F7F6",accentDark:"#0B8783",card:"#FFFFFF",border:"#E2E5EB",text:"#1A1D25",textMuted:"#6B7280",danger:"#EF4444",dangerBg:"#FEF2F2",warning:"#F59E0B",warningBg:"#FFFBEB",success:"#10B981",successBg:"#ECFDF5",blue:"#3B82F6",blueBg:"#EFF6FF"};
const lbl={fontSize:12,fontWeight:600,color:C.textMuted,display:"block",marginBottom:4};
const inp={width:"100%",padding:"8px 12px",borderRadius:8,border:`1px solid ${C.border}`,fontSize:13};
const inpSm={padding:"4px 8px",borderRadius:6,border:`1px solid ${C.border}`,fontSize:12};
const btnSm=(bg,c)=>({padding:"4px 10px",borderRadius:6,border:"none",background:bg,color:c,fontSize:11,fontWeight:600,cursor:"pointer"});
function daysAgo(d){return Math.round((new Date()-new Date(d))/(864e5));}

// ─── Load / Save ─────────────────────────────────────────────────────
function loadData(){try{const d=localStorage.getItem(SK);return d?{...EMPTY_DATA,...JSON.parse(d)}:EMPTY_DATA}catch(e){return EMPTY_DATA}}
function saveData(d){try{localStorage.setItem(SK,JSON.stringify(d))}catch(e){console.error("Save failed",e)}}

// ─── Badge ───────────────────────────────────────────────────────────
function Badge({status}){const m={ok:{bg:C.successBg,c:C.success,l:"In Stock"},low:{bg:C.warningBg,c:C.warning,l:"Low Stock"},out:{bg:C.dangerBg,c:C.danger,l:"Out of Stock"},ordered:{bg:C.blueBg,c:C.blue,l:"Ordered"},received:{bg:C.successBg,c:C.success,l:"Received"},returned:{bg:"#FDF2F8",c:"#DB2777",l:"Returned"},incomplete:{bg:C.warningBg,c:C.warning,l:"Incomplete"},wrong:{bg:C.dangerBg,c:C.danger,l:"Wrong Order"}};const s=m[status]||m.ok;return<span style={{padding:"3px 10px",borderRadius:99,fontSize:11,fontWeight:600,background:s.bg,color:s.c,whiteSpace:"nowrap"}}>{s.l}</span>}

// ─── App ─────────────────────────────────────────────────────────────
function App(){
  const[data,setDataRaw]=useState(()=>loadData());
  const[page,setPage]=useState("dashboard");
  const[location,setLocation]=useState("All");
  const[sideOpen,setSideOpen]=useState(true);
  const[modal,setModal]=useState(null);
  const[toast,setToast]=useState(null);

  const setData=useCallback((updater)=>{
    setDataRaw(prev=>{
      const next=typeof updater==="function"?updater(prev):updater;
      saveData(next);return next;
    });
  },[]);

  const showToast=useCallback((msg,type="success")=>{setToast({msg,type});setTimeout(()=>setToast(null),3000)},[]);
  const inv=useMemo(()=>data.inventory.map(i=>{const item=data.items.find(x=>x.id===i.item_id);if(!item)return null;return{...i,...item,status:i.quantity<=0?"out":i.quantity<=i.reorder_threshold?"low":"ok"}}).filter(i=>i&&(location==="All"||i.location===location)),[data,location]);
  const alerts=useMemo(()=>inv.filter(i=>i.status==="low"||i.status==="out"),[inv]);
  const filteredOrders=useMemo(()=>data.orders.filter(o=>location==="All"||o.location===location).sort((a,b)=>b.ordered_date.localeCompare(a.ordered_date)),[data.orders,location]);
  const getLastOrder=useCallback((itemId,loc)=>data.orders.filter(o=>o.item_id===itemId&&o.location===loc).sort((a,b)=>b.ordered_date.localeCompare(a.ordered_date))[0]||null,[data.orders]);

  // Handlers
  const h={
    logOrder(order){setData(p=>({...p,orders:[...p.orders,{...order,id:(p.orders.length>0?Math.max(...p.orders.map(o=>o.id)):0)+1,status:"ordered",received_date:null}]}));showToast("Order logged");setModal(null)},
    updateOrder(id,u){setData(p=>({...p,orders:p.orders.map(o=>o.id===id?{...o,...u}:o)}));showToast("Order updated")},
    deleteOrder(id){setData(p=>({...p,orders:p.orders.filter(o=>o.id!==id)}));showToast("Order deleted")},
    markReceived(id){setData(p=>{const idx=p.orders.findIndex(o=>o.id===id);if(idx<0)return p;const order=p.orders[idx];const no=[...p.orders];no[idx]={...order,status:"received",received_date:new Date().toISOString().slice(0,10)};const ni=p.inventory.map(inv=>inv.item_id===order.item_id&&inv.location===order.location?{...inv,quantity:inv.quantity+order.quantity}:inv);return{...p,orders:no,inventory:ni}});showToast("Order received — stock updated")},
    updateStock(itemId,loc,q){setData(p=>({...p,inventory:p.inventory.map(inv=>inv.item_id===itemId&&inv.location===loc?{...inv,quantity:q}:inv)}));showToast("Stock updated");setModal(null)},
    updateThreshold(itemId,loc,v){setData(p=>({...p,inventory:p.inventory.map(inv=>inv.item_id===itemId&&inv.location===loc?{...inv,reorder_threshold:v}:inv)}))},
    updateItem(itemId,u){setData(p=>({...p,items:p.items.map(it=>it.id===itemId?{...it,...u}:it)}));showToast("Item updated")},
    deleteItem(itemId){setData(p=>({...p,items:p.items.filter(it=>it.id!==itemId),inventory:p.inventory.filter(inv=>inv.item_id!==itemId),orders:p.orders.filter(o=>o.item_id!==itemId)}));showToast("Item deleted")},
    addItem(item){setData(p=>{const nid=p.nextItemId||1;const ni=["Suwanee","Tucker"].map(loc=>({item_id:nid,location:loc,quantity:0,reorder_threshold:5}));return{...p,items:[...p.items,{...item,id:nid}],inventory:[...p.inventory,...ni],nextItemId:nid+1}});showToast("Item added");setModal(null)},
    addVendor(name){let vid;setData(p=>{const exists=p.vendors.find(v=>v.name.toLowerCase()===name.toLowerCase());if(exists){vid=exists.id;return p}const nid=p.nextVendorId||1;vid=nid;return{...p,vendors:[...p.vendors,{id:nid,name}],nextVendorId:nid+1}});return vid},
    deleteVendor(id){setData(p=>({...p,vendors:p.vendors.filter(v=>v.id!==id)}));showToast("Vendor removed")},
    updateVendor(id,name){setData(p=>({...p,vendors:p.vendors.map(v=>v.id===id?{...v,name}:v)}));showToast("Vendor updated")},
  };

  const exportJSON=()=>{const b=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});const u=URL.createObjectURL(b);const a=document.createElement("a");a.href=u;a.download=`ortho-supply-data-${new Date().toISOString().slice(0,10)}.json`;a.click();URL.revokeObjectURL(u);showToast("Data exported")};
  const importJSON=(file)=>{const r=new FileReader();r.onload=(e)=>{try{const p=JSON.parse(e.target.result);if(p.items&&p.inventory&&p.orders){setData({...EMPTY_DATA,...p});showToast("Data imported")}else showToast("Invalid file","error")}catch{showToast("Parse error","error")}};r.readAsText(file)};
  const clearAll=()=>{setData({...EMPTY_DATA});try{localStorage.removeItem(SK)}catch(e){}showToast("All data cleared")};
  const exportCSV=(type)=>{let rows,headers;if(type==="inventory"){headers=["Item","Category","Type","Location","Quantity","Threshold","Unit","Cost/Unit","Status"];rows=inv.map(i=>[i.name,i.category,i.type,i.location,i.quantity,i.reorder_threshold,i.unit,i.cost_per_unit,i.status])}else{headers=["ID","Item","Category","Type","Location","Qty","Unit","Subtotal","Tax","Shipping","Discount","Total","Status","Vendor","Ordered","Received"];rows=filteredOrders.map(o=>{const vn=data.vendors.find(v=>v.id===o.vendor_id);return[o.id,o.item_name,o.category,o.type,o.location,o.quantity,o.unit||"",o.subtotal||0,o.tax||0,o.shipping||0,o.discount||0,o.total_cost,o.status,vn?.name||"",o.ordered_date,o.received_date||""]})}const csv=[headers,...rows].map(r=>r.join(",")).join("\n");const a=document.createElement("a");a.href=`data:text/csv;charset=utf-8,${encodeURIComponent(csv)}`;a.download=`${type}_export.csv`;a.click()};

  const NAV=[{id:"dashboard",icon:"dashboard",label:"Dashboard"},{id:"clinical",icon:"package",label:"Clinical Supplies"},{id:"office",icon:"briefcase",label:"Office Supplies"},{id:"orders",icon:"clipboard",label:"Order History"},{id:"spending",icon:"dollar",label:"Monthly Spending"},{id:"settings",icon:"settings",label:"Settings"}];

  return(
    <div style={{display:"flex",height:"100vh",background:C.bg,overflow:"hidden"}}>
      {/* Sidebar */}
      <div style={{width:sideOpen?240:56,minWidth:sideOpen?240:56,background:C.sidebar,color:"#fff",display:"flex",flexDirection:"column",transition:"width .2s,min-width .2s",overflow:"hidden",zIndex:20}}>
        <div style={{display:"flex",alignItems:"center",gap:10,padding:"18px 14px 14px",borderBottom:"1px solid #1E2D4A",minHeight:56}}>
          <button onClick={()=>setSideOpen(!sideOpen)} style={{background:"none",border:"none",color:"#94A3B8",cursor:"pointer",padding:4}}><I name="menu" size={20}/></button>
          {sideOpen&&<span style={{fontWeight:700,fontSize:15,whiteSpace:"nowrap",letterSpacing:-.3,color:"#E2E8F0"}}>Ortho Supply Tracker</span>}
        </div>
        <nav style={{flex:1,padding:"8px 6px"}}>{NAV.map(n=>(
          <button key={n.id} onClick={()=>setPage(n.id)} style={{display:"flex",alignItems:"center",gap:10,width:"100%",padding:"10px 12px",borderRadius:8,border:"none",cursor:"pointer",marginBottom:2,background:page===n.id?C.sideActive:"transparent",color:page===n.id?"#fff":"#94A3B8",fontSize:13,fontWeight:page===n.id?600:400,transition:"all .15s",textAlign:"left"}}><I name={n.icon} size={18}/>{sideOpen&&<span style={{whiteSpace:"nowrap"}}>{n.label}</span>}</button>
        ))}</nav>
        {sideOpen&&<div style={{padding:"12px 14px",borderTop:"1px solid #1E2D4A",fontSize:11,color:"#64748B"}}>v3.0 · GitHub Pages</div>}
      </div>

      {/* Main */}
      <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
        <header style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"0 24px",height:56,background:C.card,borderBottom:`1px solid ${C.border}`,flexShrink:0}}>
          <h1 style={{fontSize:17,fontWeight:700}}>{NAV.find(n=>n.id===page)?.label}</h1>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <div style={{display:"flex",borderRadius:8,overflow:"hidden",border:`1px solid ${C.border}`}}>{["All","Suwanee","Tucker"].map(loc=>(<button key={loc} onClick={()=>setLocation(loc)} style={{padding:"6px 14px",fontSize:12,fontWeight:500,border:"none",cursor:"pointer",background:location===loc?C.accent:"#fff",color:location===loc?"#fff":C.textMuted,transition:"all .15s"}}><I name="mappin" size={12} style={{marginRight:4,verticalAlign:-2}}/>{loc}</button>))}</div>
            <div style={{position:"relative"}}><I name="bell" size={20} color={alerts.length>0?C.danger:C.textMuted}/>{alerts.length>0&&<span style={{position:"absolute",top:-4,right:-6,background:C.danger,color:"#fff",fontSize:10,fontWeight:700,borderRadius:99,padding:"1px 5px",minWidth:16,textAlign:"center"}}>{alerts.length}</span>}</div>
          </div>
        </header>
        <main style={{flex:1,overflow:"auto",padding:24}}>
          {page==="dashboard"&&<Dashboard inv={inv} alerts={alerts} orders={filteredOrders} setModal={setModal}/>}
          {page==="clinical"&&<SupplyTable inv={inv.filter(i=>i.type==="clinical")} type="clinical" setModal={setModal} h={h} getLastOrder={getLastOrder} vendors={data.vendors}/>}
          {page==="office"&&<SupplyTable inv={inv.filter(i=>i.type==="office")} type="office" setModal={setModal} h={h} getLastOrder={getLastOrder} vendors={data.vendors}/>}
          {page==="orders"&&<OrderHistory orders={filteredOrders} setModal={setModal} h={h} data={data}/>}
          {page==="spending"&&<Spending orders={filteredOrders}/>}
          {page==="settings"&&<SettingsPage exportCSV={exportCSV} exportJSON={exportJSON} importJSON={importJSON} clearAll={clearAll} data={data} h={h}/>}
        </main>
      </div>

      {modal&&<Modal modal={modal} setModal={setModal} data={data} location={location} h={h}/>}
      {toast&&<div style={{position:"fixed",bottom:24,right:24,background:toast.type==="success"?C.success:C.danger,color:"#fff",padding:"12px 20px",borderRadius:10,fontSize:13,fontWeight:500,boxShadow:"0 8px 24px rgba(0,0,0,.18)",zIndex:999,display:"flex",alignItems:"center",gap:8,animation:"slideUp .3s ease"}}><I name="checkcircle" size={16}/>{toast.msg}</div>}
    </div>
  );
}

// ─── Dashboard ───────────────────────────────────────────────────────
function Dashboard({inv,alerts,orders,setModal}){
  const totalItems=inv.length,lowCount=alerts.filter(a=>a.status==="low").length;
  const pending=orders.filter(o=>o.status==="ordered").length;
  const issues=orders.filter(o=>["returned","incomplete","wrong"].includes(o.status)).length;
  const thisMonth=orders.filter(o=>o.ordered_date?.startsWith(new Date().toISOString().slice(0,7)));
  const monthSpend=thisMonth.reduce((s,o)=>s+o.total_cost,0);
  const stats=[{l:"Total Items",v:totalItems,icon:"package",c:C.accent,bg:C.accentLight},{l:"Low Stock",v:lowCount,icon:"alert",c:C.warning,bg:C.warningBg},{l:"Pending",v:pending,icon:"clock",c:C.blue,bg:C.blueBg},{l:"Issues",v:issues,icon:"xcircle",c:C.danger,bg:C.dangerBg}];
  return(<div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(180px,1fr))",gap:16,marginBottom:24}}>{stats.map((s,i)=>(<div key={i} style={{background:C.card,borderRadius:12,padding:"20px 18px",border:`1px solid ${C.border}`,display:"flex",alignItems:"center",gap:14}}><div style={{width:44,height:44,borderRadius:10,background:s.bg,display:"flex",alignItems:"center",justifyContent:"center"}}><I name={s.icon} size={20} color={s.c}/></div><div><div style={{fontSize:22,fontWeight:700}}>{s.v}</div><div style={{fontSize:12,color:C.textMuted}}>{s.l}</div></div></div>))}</div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:24}}>
      <button onClick={()=>setModal({type:"logOrder"})} style={{background:`linear-gradient(135deg,${C.accent},${C.accentDark})`,border:"none",borderRadius:12,padding:24,cursor:"pointer",textAlign:"left",color:"#fff"}}><I name="cart" size={28} style={{marginBottom:8}}/><div style={{fontSize:16,fontWeight:700}}>Log New Order</div><div style={{fontSize:12,opacity:.85,marginTop:4}}>Record a new supply order</div></button>
      <button onClick={()=>setModal({type:"markReceived"})} style={{background:"linear-gradient(135deg,#3B82F6,#2563EB)",border:"none",borderRadius:12,padding:24,cursor:"pointer",textAlign:"left",color:"#fff"}}><I name="packcheck" size={28} style={{marginBottom:8}}/><div style={{fontSize:16,fontWeight:700}}>Mark Received</div><div style={{fontSize:12,opacity:.85,marginTop:4}}>Update a pending order</div></button>
    </div>

// ─── Supply Table ────────────────────────────────────────────────────
function SupplyTable({inv,type,setModal,h,getLastOrder,vendors}){

  const startEdit=(item)=>{setEditingId(`${item.id}-${item.location}`);setEditRow({name:item.name,category:item.category,unit:item.unit,cost_per_unit:item.cost_per_unit})};

      <select value={catF} onChange={e=>setCatF(e.target.value)} style={{padding:"8px 12px",borderRadius:8,border:`1px solid ${C.border}`,fontSize:13,background:"#fff",minWidth:140}}><option value="All">All Categories</option>{cats.map(c=><option key={c}>{c}</option>)}</select>
      <select value={statusF} onChange={e=>setStatusF(e.target.value)} style={{padding:"8px 12px",borderRadius:8,border:`1px solid ${C.border}`,fontSize:13,background:"#fff"}}><option value="All">All Status</option><option value="ok">In Stock</option><option value="low">Low Stock</option><option value="out">Out of Stock</option></select>
      <button onClick={()=>setModal({type:"addItem",itemType:type})} style={{padding:"8px 16px",borderRadius:8,border:"none",background:C.accent,color:"#fff",fontSize:13,fontWeight:600,cursor:"pointer",display:"flex",alignItems:"center",gap:6}}><I name="plus" size={14}/> Add {tl} Item</button>
    </div>
    <div style={{fontSize:12,color:C.textMuted,marginBottom:10}}>{filtered.length} items</div>
    {inv.length===0?<div style={{background:C.card,borderRadius:12,border:`2px dashed ${C.border}`,padding:48,textAlign:"center"}}><I name="package" size={36} color={C.textMuted} style={{marginBottom:10}}/><div style={{fontSize:15,fontWeight:600,marginBottom:6}}>No {tl.toLowerCase()} supplies yet</div><div style={{fontSize:13,color:C.textMuted}}>Click "Add {tl} Item" to get started.</div></div>:(
      <div style={{background:C.card,borderRadius:12,border:`1px solid ${C.border}`,overflow:"auto"}}><table style={{width:"100%",borderCollapse:"collapse",fontSize:13,minWidth:950}}>
        <thead><tr style={{borderBottom:`2px solid ${C.border}`}}>{["Item & Last Order","Category","Location","Qty","Threshold","Unit","Cost/Unit","Status","Actions"].map(th=>(<th key={th} style={{textAlign:"left",padding:"10px 12px",fontWeight:600,color:C.textMuted,fontSize:11,textTransform:"uppercase",letterSpacing:.5,whiteSpace:"nowrap"}}>{th}</th>))}</tr></thead>
        <tbody>{filtered.map(item=>{
          const key=`${item.id}-${item.location}`;const isEd=editingId===key;
          const lo=getLastOrder(item.id,item.location);const vn=lo?vendors.find(v=>v.id===lo.vendor_id)?.name:null;const da=lo?daysAgo(lo.ordered_date):null;
          let est=null;if(lo&&lo.status==="received"&&lo.received_date){const dsr=daysAgo(lo.received_date);const consumed=lo.quantity-item.quantity;if(consumed>0&&dsr>0)est=Math.round(item.quantity/(consumed/dsr))}
          return(<tr key={key} style={{borderBottom:`1px solid ${C.border}`,background:isEd?"#F0FDFA":"transparent"}} onMouseEnter={e=>{if(!isEd)e.currentTarget.style.background="#F8FAFC"}} onMouseLeave={e=>{if(!isEd)e.currentTarget.style.background="transparent"}}>
            <td style={{padding:"10px 12px"}}>{isEd?<input value={editRow.name} onChange={e=>setEditRow({...editRow,name:e.target.value})} style={{...inpSm,width:200}}/>:<div style={{fontWeight:500}}>{item.name}</div>}
              {!isEd&&lo&&<div style={{fontSize:10,color:C.textMuted,marginTop:3,display:"flex",flexWrap:"wrap",gap:4,alignItems:"center"}}><I name="calclock" size={10}/>Last: {lo.ordered_date} ({da}d ago) · {lo.quantity} {lo.unit||"units"} · ${lo.total_cost.toFixed(2)}{vn&&<span> · {vn}</span>}{est!==null&&<span style={{color:est<=7?C.danger:est<=14?C.warning:C.success,fontWeight:600}}> · ~{est}d left</span>}</div>}
              {!isEd&&!lo&&<div style={{fontSize:10,color:C.textMuted,marginTop:2,fontStyle:"italic"}}>No orders yet</div>}
            </td>
            <td style={{padding:"10px 12px",color:C.textMuted}}>{isEd?<input value={editRow.category} onChange={e=>setEditRow({...editRow,category:e.target.value})} style={{...inpSm,width:120}}/>:item.category}</td>
            <td style={{padding:"10px 12px",color:C.textMuted,fontSize:12}}>{item.location}</td>
            <td style={{padding:"10px 12px",fontWeight:600}}>{item.quantity}</td>
            <td style={{padding:"10px 12px"}}><input type="number" value={item.reorder_threshold} onChange={e=>h.updateThreshold(item.id,item.location,Math.max(0,+e.target.value))} style={{width:50,padding:"3px 6px",border:`1px solid ${C.border}`,borderRadius:4,fontSize:12,textAlign:"center"}}/></td>
            <td style={{padding:"10px 12px",color:C.textMuted,fontSize:12}}>{isEd?<input value={editRow.unit} onChange={e=>setEditRow({...editRow,unit:e.target.value})} style={{...inpSm,width:80}}/>:item.unit}</td>
            <td style={{padding:"10px 12px"}}>{isEd?<input type="number" step="0.01" value={editRow.cost_per_unit} onChange={e=>setEditRow({...editRow,cost_per_unit:e.target.value})} style={{...inpSm,width:70}}/>:`$${item.cost_per_unit}`}</td>
            <td style={{padding:"10px 12px"}}><Badge status={item.status}/></td>
            <td style={{padding:"10px 12px"}}><div style={{display:"flex",gap:4,alignItems:"center",flexWrap:"wrap"}}>{isEd?<><button onClick={()=>saveEdit(item)} style={btnSm(C.success,"#fff")}><I name="save" size={12}/></button><button onClick={()=>setEditingId(null)} style={btnSm("#E2E5EB",C.text)}><I name="x" size={12}/></button></>:<><button onClick={()=>setModal({type:"updateStock",item})} style={btnSm(C.accentLight,C.accent)}>Stock</button><button onClick={()=>startEdit(item)} style={btnSm(C.blueBg,C.blue)}><I name="pencil" size={12}/></button>{confirmDel===key?<div style={{display:"flex",gap:2}}><button onClick={()=>{h.deleteItem(item.id);setConfirmDel(null)}} style={btnSm(C.danger,"#fff")}>Yes</button><button onClick={()=>setConfirmDel(null)} style={btnSm("#E2E5EB",C.text)}>No</button></div>:<button onClick={()=>setConfirmDel(key)} style={btnSm(C.dangerBg,C.danger)}><I name="trash" size={12}/></button>}</>}</div></td>
          </tr>);
        })}</tbody>
      </table>{filtered.length===0&&<div style={{padding:40,textAlign:"center",color:C.textMuted}}>No items match</div>}</div>
    )}
  </div>);
}

// ─── Spending ────────────────────────────────────────────────────────
function Spending({orders}){
  const rcv=orders.filter(o=>o.status==="received");
  const md=useMemo(()=>{const m={};rcv.forEach(o=>{const mo=o.ordered_date.slice(0,7);if(!m[mo])m[mo]={month:mo,clinical:0,office:0};m[mo][o.type]+=o.total_cost});return Object.values(m).sort((a,b)=>a.month.localeCompare(b.month)).map(d=>({...d,clinical:+d.clinical.toFixed(2),office:+d.office.toFixed(2),label:new Date(d.month+"-01").toLocaleDateString("en-US",{month:"short",year:"numeric"})}))},[rcv]);
  const tc=rcv.filter(o=>o.type==="clinical").reduce((s,o)=>s+o.total_cost,0);const to=rcv.filter(o=>o.type==="office").reduce((s,o)=>s+o.total_cost,0);
  const pd=[{name:"Clinical",value:+tc.toFixed(2)},{name:"Office",value:+to.toFixed(2)}];const CL=[C.accent,"#3B82F6"];
  const cb=useMemo(()=>{const m={};rcv.forEach(o=>{if(!m[o.category])m[o.category]=0;m[o.category]+=o.total_cost});return Object.entries(m).sort((a,b)=>b[1]-a[1]).slice(0,10).map(([n,v])=>({name:n,value:+v.toFixed(2)}))},[rcv]);
  if(rcv.length===0)return<div style={{background:C.card,borderRadius:12,border:`2px dashed ${C.border}`,padding:48,textAlign:"center"}}><I name="dollar" size={36} color={C.textMuted} style={{marginBottom:10}}/><div style={{fontSize:15,fontWeight:600}}>No spending data yet</div></div>;
  return(<div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:24}}>
      <div style={{background:C.card,borderRadius:12,border:`1px solid ${C.border}`,padding:20}}><h3 style={{fontSize:15,fontWeight:700,marginBottom:16}}>Monthly Trend</h3><ResponsiveContainer width="100%" height={260}><BarChart data={md}><CartesianGrid strokeDasharray="3 3" stroke={C.border}/><XAxis dataKey="label" tick={{fontSize:11}} stroke={C.textMuted}/><YAxis tick={{fontSize:11}} stroke={C.textMuted} tickFormatter={v=>`$${v}`}/><Tooltip formatter={v=>`$${v.toFixed(2)}`}/><Bar dataKey="clinical" name="Clinical" fill={C.accent} radius={[4,4,0,0]}/><Bar dataKey="office" name="Office" fill="#3B82F6" radius={[4,4,0,0]}/><Legend wrapperStyle={{fontSize:12}}/></BarChart></ResponsiveContainer></div>
      <div style={{background:C.card,borderRadius:12,border:`1px solid ${C.border}`,padding:20}}><h3 style={{fontSize:15,fontWeight:700,marginBottom:16}}>Clinical vs Office</h3><ResponsiveContainer width="100%" height={260}><PieChart><Pie data={pd} cx="50%" cy="50%" outerRadius={90} innerRadius={50} dataKey="value" label={({name,percent})=>`${name} ${(percent*100).toFixed(0)}%`} labelLine={false}>{pd.map((e,i)=><Cell key={i} fill={CL[i]}/>)}</Pie><Tooltip formatter={v=>`$${v.toFixed(2)}`}/></PieChart></ResponsiveContainer><div style={{display:"flex",justifyContent:"center",gap:24,marginTop:8}}><div style={{textAlign:"center"}}><div style={{fontSize:10,color:C.textMuted,fontWeight:600}}>CLINICAL</div><div style={{fontSize:16,fontWeight:700,color:C.accent}}>${tc.toFixed(2)}</div></div><div style={{textAlign:"center"}}><div style={{fontSize:10,color:C.textMuted,fontWeight:600}}>OFFICE</div><div style={{fontSize:16,fontWeight:700,color:"#3B82F6"}}>${to.toFixed(2)}</div></div></div></div>
    </div>
    <div style={{background:C.card,borderRadius:12,border:`1px solid ${C.border}`,padding:20}}><h3 style={{fontSize:15,fontWeight:700,marginBottom:16}}>Top Categories</h3><ResponsiveContainer width="100%" height={280}><BarChart data={cb} layout="vertical" margin={{left:120}}><CartesianGrid strokeDasharray="3 3" stroke={C.border}/><XAxis type="number" tick={{fontSize:11}} stroke={C.textMuted} tickFormatter={v=>`$${v}`}/><YAxis type="category" dataKey="name" tick={{fontSize:11}} stroke={C.textMuted} width={110}/><Tooltip formatter={v=>`$${v.toFixed(2)}`}/><Bar dataKey="value" fill={C.accent} radius={[0,4,4,0]}/></BarChart></ResponsiveContainer></div>
  </div>);
}

    </div>

    <div style={{background:C.card,borderRadius:12,border:`1px solid ${C.border}`,padding:24,marginBottom:20}}>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:16}}><I name="store" size={18} color={C.accent}/><h3 style={{fontSize:15,fontWeight:700}}>Vendors / Suppliers</h3></div>
      <div style={{display:"flex",gap:8,marginBottom:16}}><input value={newV} onChange={e=>setNewV(e.target.value)} placeholder="Add vendor..." style={{...inp,flex:1}} onKeyDown={e=>{if(e.key==="Enter"&&newV.trim()){h.addVendor(newV.trim());setNewV("")}}}/><button disabled={!newV.trim()} onClick={()=>{if(newV.trim()){h.addVendor(newV.trim());setNewV("")}}} style={{padding:"8px 16px",borderRadius:8,border:"none",background:newV.trim()?C.accent:"#CBD5E1",color:"#fff",fontSize:13,fontWeight:600,cursor:newV.trim()?"pointer":"not-allowed"}}><I name="plus" size={14}/></button></div>
      {data.vendors.length===0?<div style={{fontSize:13,color:C.textMuted,textAlign:"center",padding:16}}>No vendors yet</div>:<div style={{maxHeight:200,overflow:"auto"}}>{data.vendors.map(v=>(<div key={v.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"8px 0",borderBottom:`1px solid ${C.border}`}}>{editVId===v.id?<div style={{display:"flex",gap:6,flex:1,alignItems:"center"}}><input value={editVN} onChange={e=>setEditVN(e.target.value)} style={{...inpSm,flex:1}}/><button onClick={()=>{h.updateVendor(v.id,editVN);setEditVId(null)}} style={btnSm(C.success,"#fff")}><I name="save" size={12}/></button><button onClick={()=>setEditVId(null)} style={btnSm("#E2E5EB",C.text)}><I name="x" size={12}/></button></div>:<div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flex:1}}><span style={{fontSize:13}}>{v.name}</span><div style={{display:"flex",gap:4}}><button onClick={()=>{setEditVId(v.id);setEditVN(v.name)}} style={btnSm(C.blueBg,C.blue)}><I name="pencil" size={11}/></button><button onClick={()=>h.deleteVendor(v.id)} style={btnSm(C.dangerBg,C.danger)}><I name="trash" size={11}/></button></div></div>}</div>))}</div>}
    </div>

    <div style={{background:C.card,borderRadius:12,border:`1px solid ${C.border}`,padding:24,marginBottom:20}}>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:16}}><I name="filedown" size={18} color={C.accent}/><h3 style={{fontSize:15,fontWeight:700}}>Backup & Restore</h3></div>
      <div style={{display:"flex",gap:10,marginBottom:12}}><button onClick={exportJSON} style={{flex:1,padding:12,borderRadius:8,border:`1px solid ${C.border}`,background:"#fff",fontSize:13,fontWeight:500,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}><I name="filedown" size={16} color={C.accent}/>Export JSON</button><button onClick={()=>fileRef.current?.click()} style={{flex:1,padding:12,borderRadius:8,border:`1px solid ${C.border}`,background:"#fff",fontSize:13,fontWeight:500,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}><I name="fileup" size={16} color={C.blue}/>Import JSON</button><input ref={fileRef} type="file" accept=".json" style={{display:"none"}} onChange={e=>{if(e.target.files[0])importJSON(e.target.files[0]);e.target.value=""}}/></div>
      <div style={{display:"flex",gap:10}}><button onClick={()=>exportCSV("inventory")} style={{flex:1,padding:8,borderRadius:8,border:`1px solid ${C.border}`,background:"#fff",fontSize:12,cursor:"pointer"}}><I name="download" size={14}/> Inventory CSV</button><button onClick={()=>exportCSV("orders")} style={{flex:1,padding:8,borderRadius:8,border:`1px solid ${C.border}`,background:"#fff",fontSize:12,cursor:"pointer"}}><I name="download" size={14}/> Orders CSV</button></div>
    </div>

    <div style={{background:C.card,borderRadius:12,border:`1px solid ${C.danger}30`,padding:24}}>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:16}}><I name="trash" size={18} color={C.danger}/><h3 style={{fontSize:15,fontWeight:700,color:C.danger}}>Danger Zone</h3></div>
      {confirmClear?<div><div style={{fontSize:13,marginBottom:12,color:C.danger,fontWeight:500}}>Delete everything?</div><div style={{display:"flex",gap:10}}><button onClick={()=>{clearAll();setConfirmClear(false)}} style={{padding:"8px 18px",borderRadius:8,border:"none",background:C.danger,color:"#fff",fontSize:13,fontWeight:600,cursor:"pointer"}}>Yes, Delete All</button><button onClick={()=>setConfirmClear(false)} style={{padding:"8px 18px",borderRadius:8,border:`1px solid ${C.border}`,background:"#fff",fontSize:13,cursor:"pointer"}}>Cancel</button></div></div>:<button onClick={()=>setConfirmClear(true)} style={{padding:"8px 18px",borderRadius:8,border:`1px solid ${C.danger}`,background:"#fff",color:C.danger,fontSize:13,fontWeight:500,cursor:"pointer"}}>Clear All Data</button>}
    </div>
  </div>);
}

// ─── Modal ───────────────────────────────────────────────────────────
function Modal({modal,setModal,data,location,h}){
  const[form,setForm]=useState(()=>{
    if(modal.type==="logOrder")return{item_id:"",quantity:1,location:location==="All"?"Suwanee":location,notes:"",tax:0,shipping:0,discount:0,vendor_id:"",newVendor:""};
    if(modal.type==="addItem")return{name:"",category:"",unit:"",cost_per_unit:0};
    return{};
  });
  const[showNewV,setShowNewV]=useState(false);
  const pending=data.orders.filter(o=>o.status==="ordered"&&(location==="All"||o.location===location));

  if(modal.type==="addItem"){
    const cats=modal.itemType==="clinical"?["Brackets","Wires","Bands","Elastics","Bonding Adhesive","Separators","Retainer Materials","Cheek Retractors","Ligature Ties","Archwires","Debonding Burs","Cheek Cushions","Disposables","Anesthesia"]:["Wipes","Towels","Cleaning Products","Sterilization Supplies","Patient Amenities"];
    return<MW title={`Add ${modal.itemType==="clinical"?"Clinical":"Office"} Item`} onClose={()=>setModal(null)}>
      <label style={lbl}>Item Name</label><input value={form.name} onChange={e=>setForm({...form,name:e.target.value})} style={{...inp,marginBottom:12}} placeholder="e.g. Bracket Removal Plier"/>
      <label style={lbl}>Category</label><select value={form.category} onChange={e=>setForm({...form,category:e.target.value})} style={{...inp,marginBottom:12}}><option value="">Select...</option>{cats.map(c=><option key={c}>{c}</option>)}</select>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}><div><label style={lbl}>Unit</label><input value={form.unit} onChange={e=>setForm({...form,unit:e.target.value})} style={inp} placeholder="pack/10"/></div><div><label style={lbl}>Cost ($)</label><input type="number" step="0.01" value={form.cost_per_unit} onChange={e=>setForm({...form,cost_per_unit:e.target.value})} style={inp}/></div></div>
      <button disabled={!form.name||!form.category||!form.unit} onClick={()=>h.addItem({name:form.name,category:form.category,type:modal.itemType,unit:form.unit,cost_per_unit:+form.cost_per_unit})} style={{width:"100%",padding:10,borderRadius:8,border:"none",background:(form.name&&form.category&&form.unit)?C.accent:"#CBD5E1",color:"#fff",fontSize:14,fontWeight:600,cursor:(form.name&&form.category&&form.unit)?"pointer":"not-allowed"}}>Add Item</button>
    </MW>}

  if(modal.type==="updateStock")return<MW title="Update Stock" onClose={()=>setModal(null)}><div style={{marginBottom:12}}><div style={{fontWeight:600,marginBottom:4}}>{modal.item.name}</div><div style={{fontSize:12,color:C.textMuted}}>{modal.item.location} · Current: {modal.item.quantity} {modal.item.unit}</div></div><label style={lbl}>New Quantity</label><input type="number" defaultValue={modal.item.quantity} id="nq" style={{...inp,marginBottom:16}}/><button onClick={()=>h.updateStock(modal.item.id,modal.item.location,Math.max(0,+document.getElementById("nq").value))} style={{width:"100%",padding:10,borderRadius:8,border:"none",background:C.accent,color:"#fff",fontSize:14,fontWeight:600,cursor:"pointer"}}>Update</button></MW>;

  if(modal.type==="markReceived")return<MW title="Mark Received" onClose={()=>setModal(null)}>{pending.length===0?<div style={{textAlign:"center",padding:20,color:C.textMuted}}>No pending orders</div>:<div style={{maxHeight:350,overflow:"auto"}}>{pending.map(o=>(<div key={o.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 0",borderBottom:`1px solid ${C.border}`}}><div><div style={{fontWeight:500,fontSize:13}}>#{o.id} — {o.item_name}</div><div style={{fontSize:11,color:C.textMuted}}>{o.location} · {o.quantity} {o.unit||"units"} · ${o.total_cost.toFixed(2)}</div></div><button onClick={()=>{h.markReceived(o.id);setModal(null)}} style={{padding:"5px 14px",borderRadius:6,border:"none",background:C.success,color:"#fff",fontSize:11,fontWeight:600,cursor:"pointer"}}>Receive</button></div>))}</div>}</MW>;

  // Log Order
  const sel=data.items.find(i=>i.id===+form.item_id);
  const sub=sel?+(form.quantity*sel.cost_per_unit).toFixed(2):0;
  const tot=+(sub+(+form.tax||0)+(+form.shipping||0)-(+form.discount||0)).toFixed(2);
  const lo=sel?data.orders.filter(o=>o.item_id===sel.id&&o.location===form.location).sort((a,b)=>b.ordered_date.localeCompare(a.ordered_date))[0]:null;
  const lv=lo?data.vendors.find(v=>v.id===lo.vendor_id)?.name:null;

  return<MW title="Log New Order" onClose={()=>setModal(null)}>
    {data.items.length===0?<div style={{textAlign:"center",padding:20,color:C.textMuted}}>Add items in Clinical or Office Supplies first.</div>:<>
      <label style={lbl}>Item</label>
      <select value={form.item_id} onChange={e=>setForm({...form,item_id:e.target.value})} style={{...inp,marginBottom:4}}><option value="">Select...</option>{[...data.items].sort((a,b)=>a.name.localeCompare(b.name)).map(i=>(<option key={i.id} value={i.id}>{i.name} ({i.category})</option>))}</select>
      {lo&&<div style={{padding:10,background:"#FFF7ED",borderRadius:8,fontSize:11,color:"#92400E",marginBottom:12,marginTop:4,display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}><I name="calclock" size={12}/><strong>Last:</strong> {lo.ordered_date} ({daysAgo(lo.ordered_date)}d ago) · {lo.quantity} {lo.unit||"units"} · ${lo.total_cost.toFixed(2)}{lv&&<span> · {lv}</span>}</div>}
      {sel&&!lo&&<div style={{fontSize:11,color:C.textMuted,marginBottom:12,marginTop:4,fontStyle:"italic"}}>No previous orders at {form.location}</div>}
      {!sel&&<div style={{marginBottom:8}}/>}

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
        <div><label style={lbl}>Quantity {sel&&<span style={{fontWeight:400,color:C.accent}}>({sel.unit})</span>}</label><div style={{display:"flex",alignItems:"center",gap:6}}><input type="number" value={form.quantity} min={1} onChange={e=>setForm({...form,quantity:Math.max(1,+e.target.value)})} style={{...inp,flex:1}}/>{sel&&<span style={{fontSize:12,color:C.textMuted,whiteSpace:"nowrap"}}>{sel.unit}</span>}</div></div>
        <div><label style={lbl}>Location</label><select value={form.location} onChange={e=>setForm({...form,location:e.target.value})} style={inp}><option>Suwanee</option><option>Tucker</option></select></div>
      </div>

      <label style={lbl}>Purchased From</label>
      {showNewV?<div style={{display:"flex",gap:6,marginBottom:12}}><input value={form.newVendor} onChange={e=>setForm({...form,newVendor:e.target.value})} placeholder="New vendor..." style={{...inp,flex:1}}/><button onClick={()=>{if(form.newVendor.trim()){const vid=h.addVendor(form.newVendor.trim());setForm({...form,vendor_id:String(vid),newVendor:""});setShowNewV(false)}}} style={{padding:"8px 14px",borderRadius:8,border:"none",background:C.accent,color:"#fff",fontSize:12,fontWeight:600,cursor:"pointer"}}>Add</button><button onClick={()=>setShowNewV(false)} style={{padding:"8px 10px",borderRadius:8,border:`1px solid ${C.border}`,background:"#fff",fontSize:12,cursor:"pointer"}}><I name="x" size={14}/></button></div>:
      <select value={form.vendor_id} onChange={e=>{if(e.target.value==="__new__")setShowNewV(true);else setForm({...form,vendor_id:e.target.value})}} style={{...inp,marginBottom:12}}><option value="">Select vendor...</option>{data.vendors.map(v=>(<option key={v.id} value={v.id}>{v.name}</option>))}<option value="__new__">+ Add new vendor...</option></select>}

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:12}}>
        <div><label style={lbl}>Tax ($)</label><input type="number" step="0.01" value={form.tax} onChange={e=>setForm({...form,tax:e.target.value})} style={inp}/></div>
        <div><label style={lbl}>Shipping ($)</label><input type="number" step="0.01" value={form.shipping} onChange={e=>setForm({...form,shipping:e.target.value})} style={inp}/></div>
        <div><label style={lbl}>Discount ($)</label><input type="number" step="0.01" value={form.discount} onChange={e=>setForm({...form,discount:e.target.value})} style={inp}/></div>
      </div>
      <label style={lbl}>Notes</label><input value={form.notes} onChange={e=>setForm({...form,notes:e.target.value})} style={{...inp,marginBottom:16}} placeholder="PO number, urgency..."/>
      {sel&&<div style={{padding:14,background:"#F1F5F9",borderRadius:10,fontSize:12,marginBottom:16}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span>Subtotal ({form.quantity} × ${sel.cost_per_unit}/{sel.unit})</span><span style={{fontWeight:600}}>${sub.toFixed(2)}</span></div>
        {+form.tax>0&&<div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span>Tax</span><span>${(+form.tax).toFixed(2)}</span></div>}
        {+form.shipping>0&&<div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span>Shipping</span><span>${(+form.shipping).toFixed(2)}</span></div>}
        {+form.discount>0&&<div style={{display:"flex",justifyContent:"space-between",marginBottom:4,color:C.success}}><span>Discount</span><span>-${(+form.discount).toFixed(2)}</span></div>}
        <div style={{display:"flex",justifyContent:"space-between",borderTop:`1px solid ${C.border}`,paddingTop:8,marginTop:6}}><span style={{fontWeight:700,fontSize:14}}>Total</span><span style={{fontWeight:700,fontSize:14,color:C.accent}}>${tot.toFixed(2)}</span></div>
      </div>}
      <button disabled={!form.item_id} onClick={()=>{if(!sel)return;h.logOrder({item_id:sel.id,item_name:sel.name,category:sel.category,type:sel.type,unit:sel.unit,location:form.location,quantity:+form.quantity,subtotal:sub,tax:+form.tax||0,shipping:+form.shipping||0,discount:+form.discount||0,total_cost:tot,vendor_id:form.vendor_id?+form.vendor_id:null,ordered_date:new Date().toISOString().slice(0,10),notes:form.notes})}} style={{width:"100%",padding:10,borderRadius:8,border:"none",background:form.item_id?C.accent:"#CBD5E1",color:"#fff",fontSize:14,fontWeight:600,cursor:form.item_id?"pointer":"not-allowed"}}>Log Order — ${tot.toFixed(2)}</button>
    </>}
  </MW>;
}

function MW({title,onClose,children}){return<div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,.4)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100,animation:"fadeIn .2s"}}><div onClick={e=>e.stopPropagation()} style={{background:"#fff",borderRadius:14,padding:24,width:500,maxWidth:"95vw",maxHeight:"85vh",overflow:"auto",boxShadow:"0 20px 60px rgba(0,0,0,.2)"}}><div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}><h3 style={{fontSize:16,fontWeight:700}}>{title}</h3><button onClick={onClose} style={{background:"none",border:"none",cursor:"pointer",color:C.textMuted,padding:4}}><I name="x" size={18}/></button></div>{children}</div></div>}

// ─── Mount ───────────────────────────────────────────────────────────
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
