<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Ortho Supply Tracker</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/prop-types@15/prop-types.min.js"></script>
<script src="https://unpkg.com/recharts@2.5.0/umd/Recharts.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#F8F9FB;color:#1A1D25}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:3px}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useMemo,useCallback,useEffect,useRef}=React;
const{BarChart,Bar,XAxis,YAxis,Tooltip,ResponsiveContainer,PieChart,Pie,Cell,Legend,CartesianGrid}=Recharts;

// ─── SVG Icon Component ──────────────────────────────────────────────
const PATHS={
  dashboard:["M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z","M9 22V12h6v10"],
  package:["M16.5 9.4l-9-5.19","M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z","M3.27 6.96L12 12.01l8.73-5.05","M12 22.08V12"],
  briefcase:["M20 7H4a2 2 0 00-2 2v10a2 2 0 002 2h16a2 2 0 002-2V9a2 2 0 00-2-2z","M16 21V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v16"],
  clipboard:["M16 4h2a2 2 0 012 2v14a2 2 0 01-2 2H6a2 2 0 01-2-2V6a2 2 0 012-2h2","M9 2h6v4H9z"],
  dollar:["M12 1v22","M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"],
  settings:["M12.22 2h-.44a2 2 0 00-2 2v.18a2 2 0 01-1 1.73l-.43.25a2 2 0 01-2 0l-.15-.08a2 2 0 00-2.73.73l-.22.38a2 2 0 00.73 2.73l.15.1a2 2 0 011 1.72v.51a2 2 0 01-1 1.74l-.15.09a2 2 0 00-.73 2.73l.22.38a2 2 0 002.73.73l.15-.08a2 2 0 012 0l.43.25a2 2 0 011 1.73V20a2 2 0 002 2h.44a2 2 0 002-2v-.18a2 2 0 011-1.73l.43-.25a2 2 0 012 0l.15.08a2 2 0 002.73-.73l.22-.39a2 2 0 00-.73-2.73l-.15-.08a2 2 0 01-1-1.74v-.5a2 2 0 011-1.74l.15-.09a2 2 0 00.73-2.73l-.22-.38a2 2 0 00-2.73-.73l-.15.08a2 2 0 01-2 0l-.43-.25a2 2 0 01-1-1.73V4a2 2 0 00-2-2z","M12 15a3 3 0 100-6 3 3 0 000 6z"],
  alert:["M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z","M12 9v4","M12 17h.01"],
  search:["M11 19a8 8 0 100-16 8 8 0 000 16z","M21 21l-4.35-4.35"],
  x:["M18 6L6 18","M6 6l12 12"],
  plus:["M12 5v14","M5 12h14"],
  download:["M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4","M7 10l5 5 5-5","M12 15V3"],
  database:["M12 2C6.5 2 2 4 2 6.5v11C2 20 6.5 22 12 22s10-2 10-4.5v-11C22 4 17.5 2 12 2z","M2 6.5C2 9 6.5 11 12 11s10-2 10-4.5","M2 12c0 2.5 4.5 4.5 10 4.5s10-2 10-4.5"],
  mappin:["M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z","M12 13a3 3 0 100-6 3 3 0 000 6z"],
  cart:["M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6","M9 22a1 1 0 100-2 1 1 0 000 2z","M20 22a1 1 0 100-2 1 1 0 000 2z"],
  packcheck:["M16.5 9.4l-9-5.19","M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z","M9 17l3 3 5-7"],
  menu:["M3 12h18","M3 6h18","M3 18h18"],
  bell:["M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9","M13.73 21a2 2 0 01-3.46 0"],
  checkcircle:["M22 11.08V12a10 10 0 11-5.93-9.14","M22 4L12 14.01l-3-3"],
  clock:["M12 22a10 10 0 100-20 10 10 0 000 20z","M12 6v6l4 2"],
  xcircle:["M12 22a10 10 0 100-20 10 10 0 000 20z","M15 9l-6 6","M9 9l6 6"],
  pencil:["M17 3a2.83 2.83 0 114 4L7.5 20.5 2 22l1.5-5.5z"],
  trash:["M3 6h18","M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"],
  save:["M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z","M17 21v-8H7v8","M7 3v5h8"],
  filedown:["M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z","M14 2v6h6","M12 18v-6","M9 15l3 3 3-3"],
  fileup:["M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z","M14 2v6h6","M12 12v6","M15 15l-3-3-3 3"],
  store:["M3 3h18v4H3z","M21 7v14H3V7","M10 11h4v10h-4z"],
  calclock:["M12 22a10 10 0 100-20 10 10 0 000 20z","M12 6v6l3 3"],
  analytics:["M18 20V10","M12 20V4","M6 20v-6"],
};
function Ic({name,size=18,color="currentColor",style={}}){
  const paths=PATHS[name]||PATHS.package;
  return React.createElement("svg",{width:size,height:size,viewBox:"0 0 24 24",fill:"none",stroke:color,strokeWidth:2,strokeLinecap:"round",strokeLinejoin:"round",style:{flexShrink:0,display:"inline-block",verticalAlign:"middle",...style}},
    ...paths.map((d,i)=>React.createElement("path",{key:i,d})));
}

const EMPTY_DATA={items:[],inventory:[],orders:[],vendors:[],nextItemId:1,nextVendorId:1};
const SK="ortho-supply-tracker-data";
const C={bg:"#F8F9FB",sidebar:"#0F1729",sideActive:"#243352",accent:"#0EA5A0",accentLight:"#E6F7F6",accentDark:"#0B8783",card:"#FFFFFF",border:"#E2E5EB",text:"#1A1D25",textMuted:"#6B7280",danger:"#EF4444",dangerBg:"#FEF2F2",warning:"#F59E0B",warningBg:"#FFFBEB",success:"#10B981",successBg:"#ECFDF5",blue:"#3B82F6",blueBg:"#EFF6FF"};
const lbl={fontSize:12,fontWeight:600,color:C.textMuted,display:"block",marginBottom:4};
const inp={width:"100%",padding:"8px 12px",borderRadius:8,border:`1px solid ${C.border}`,fontSize:13,background:"#fff"};
const inpSm={padding:"4px 8px",borderRadius:6,border:`1px solid ${C.border}`,fontSize:12,background:"#fff"};
const btnSm=(bg,c)=>({padding:"4px 10px",borderRadius:6,border:"none",background:bg,color:c,fontSize:11,fontWeight:600,cursor:"pointer"});
function daysAgo(d){return Math.round((new Date()-new Date(d))/(864e5));}
function loadData(){try{const d=localStorage.getItem(SK);return d?{...EMPTY_DATA,...JSON.parse(d)}:EMPTY_DATA}catch(e){return EMPTY_DATA}}
function saveData(d){try{localStorage.setItem(SK,JSON.stringify(d))}catch(e){}}

function Badge({status}){const m={ok:{bg:C.successBg,c:C.success,l:"In Stock"},low:{bg:C.warningBg,c:C.warning,l:"Low Stock"},out:{bg:C.dangerBg,c:C.danger,l:"Out of Stock"},ordered:{bg:C.blueBg,c:C.blue,l:"Ordered"},received:{bg:C.successBg,c:C.success,l:"Received"},returned:{bg:"#FDF2F8",c:"#DB2777",l:"Returned"},incomplete:{bg:C.warningBg,c:C.warning,l:"Incomplete"},wrong:{bg:C.dangerBg,c:C.danger,l:"Wrong Order"}};const s=m[status]||m.ok;return<span style={{padding:"3px 10px",borderRadius:99,fontSize:11,fontWeight:600,background:s.bg,color:s.c,whiteSpace:"nowrap"}}>{s.l}</span>}

function App(){
  const[data,setDataRaw]=useState(()=>loadData());
  const[page,setPage]=useState("dashboard");
  const[loc,setLoc]=useState("All");
  const[sideOpen,setSideOpen]=useState(true);
  const[modal,setModal]=useState(null);
  const[toast,setToast]=useState(null);
  const setData=useCallback(updater=>{setDataRaw(prev=>{const next=typeof updater==="function"?updater(prev):updater;saveData(next);return next})},[]);
  const showToast=useCallback((msg,type="success")=>{setToast({msg,type});setTimeout(()=>setToast(null),3000)},[]);
  const inv=useMemo(()=>data.inventory.map(i=>{const item=data.items.find(x=>x.id===i.item_id);if(!item)return null;return{...i,...item,status:i.quantity<=0?"out":i.quantity<=i.reorder_threshold?"low":"ok"}}).filter(i=>i&&(loc==="All"||i.location===loc)),[data,loc]);
  const alerts=useMemo(()=>inv.filter(i=>i.status==="low"||i.status==="out"),[inv]);
  const fOrders=useMemo(()=>data.orders.filter(o=>loc==="All"||o.location===loc).sort((a,b)=>b.ordered_date.localeCompare(a.ordered_date)),[data.orders,loc]);
  const getLastOrder=useCallback((itemId,l)=>data.orders.filter(o=>o.item_id===itemId&&o.location===l).sort((a,b)=>b.ordered_date.localeCompare(a.ordered_date))[0]||null,[data.orders]);

  const h={
    logOrder(order){setData(p=>({...p,orders:[...p.orders,{...order,id:(p.orders.length>0?Math.max(...p.orders.map(o=>o.id)):0)+1,status:"ordered",received_date:null}]}));showToast("Order logged");setModal(null)},
    updateOrder(id,u){setData(p=>({...p,orders:p.orders.map(o=>o.id===id?{...o,...u}:o)}));showToast("Order updated")},
    deleteOrder(id){setData(p=>({...p,orders:p.orders.filter(o=>o.id!==id)}));showToast("Order deleted")},
    markReceived(id,rcvDate){setData(p=>{const idx=p.orders.findIndex(o=>o.id===id);if(idx<0)return p;const order=p.orders[idx];const no=[...p.orders];no[idx]={...order,status:"received",received_date:rcvDate||new Date().toISOString().slice(0,10)};const ni=p.inventory.map(inv=>inv.item_id===order.item_id&&inv.location===order.location?{...inv,quantity:inv.quantity+order.quantity}:inv);return{...p,orders:no,inventory:ni}});showToast("Received — stock updated")},
    updateStock(iid,l,q){setData(p=>({...p,inventory:p.inventory.map(inv=>inv.item_id===iid&&inv.location===l?{...inv,quantity:q}:inv)}));showToast("Stock updated");setModal(null)},
    updateThreshold(iid,l,v){setData(p=>({...p,inventory:p.inventory.map(inv=>inv.item_id===iid&&inv.location===l?{...inv,reorder_threshold:v}:inv)}))},
    updateItem(iid,u){setData(p=>({...p,items:p.items.map(it=>it.id===iid?{...it,...u}:it)}));showToast("Item updated")},
    deleteItem(iid){setData(p=>({...p,items:p.items.filter(it=>it.id!==iid),inventory:p.inventory.filter(inv=>inv.item_id!==iid),orders:p.orders.filter(o=>o.item_id!==iid)}));showToast("Item deleted")},
    addItem(item,itemLoc){setData(p=>{const nid=p.nextItemId||1;const locs=itemLoc==="Both"?["Suwanee","Tucker"]:[itemLoc];const ni=locs.map(l=>({item_id:nid,location:l,quantity:0,reorder_threshold:5}));return{...p,items:[...p.items,{...item,id:nid}],inventory:[...p.inventory,...ni],nextItemId:nid+1}});showToast("Item added");setModal(null)},
    addVendor(name){let vid;setDataRaw(prev=>{const exists=prev.vendors.find(v=>v.name.toLowerCase()===name.toLowerCase());if(exists){vid=exists.id;return prev}const nid=prev.nextVendorId||1;vid=nid;const next={...prev,vendors:[...prev.vendors,{id:nid,name}],nextVendorId:nid+1};saveData(next);return next});return vid},
    deleteVendor(id){setData(p=>({...p,vendors:p.vendors.filter(v=>v.id!==id)}));showToast("Vendor removed")},
    updateVendor(id,name){setData(p=>({...p,vendors:p.vendors.map(v=>v.id===id?{...v,name}:v)}));showToast("Vendor updated")},
  };

  const exportJSON=()=>{const b=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});const u=URL.createObjectURL(b);const a=document.createElement("a");a.href=u;a.download=`ortho-data-${new Date().toISOString().slice(0,10)}.json`;a.click();URL.revokeObjectURL(u);showToast("Exported")};
  const importJSON=file=>{const r=new FileReader();r.onload=e=>{try{const p=JSON.parse(e.target.result);if(p.items&&p.orders){setData({...EMPTY_DATA,...p});showToast("Imported")}else showToast("Invalid","error")}catch{showToast("Error","error")}};r.readAsText(file)};
  const clearAll=()=>{setData({...EMPTY_DATA});try{localStorage.removeItem(SK)}catch(e){}showToast("Cleared")};
  const exportCSV=type=>{let rows,hd;if(type==="inventory"){hd=["Item","Category","Type","Location","Qty","Threshold","Unit","Status"];rows=inv.map(i=>[i.name,i.category,i.type,i.location,i.quantity,i.reorder_threshold,i.unit,i.status])}else{hd=["ID","Item","Category","Type","Location","Qty","Unit","Subtotal","Tax","Ship","Disc","Total","Status","Vendor","Ordered","Received"];rows=fOrders.map(o=>{const vn=data.vendors.find(v=>v.id===o.vendor_id);return[o.id,o.item_name,o.category,o.type,o.location,o.quantity,o.unit||"",o.subtotal||0,o.tax||0,o.shipping||0,o.discount||0,o.total_cost,o.status,vn?.name||"",o.ordered_date,o.received_date||""]})}const csv=[hd,...rows].map(r=>r.join(",")).join("\n");const a=document.createElement("a");a.href=`data:text/csv;charset=utf-8,${encodeURIComponent(csv)}`;a.download=`${type}.csv`;a.click()};

  const NAV=[{id:"dashboard",icon:"dashboard",label:"Dashboard"},{id:"clinical",icon:"package",label:"Clinical Supplies"},{id:"office",icon:"briefcase",label:"Office Supplies"},{id:"orders",icon:"clipboard",label:"Order History"},{id:"analytics",icon:"analytics",label:"Analytics"},{id:"spending",icon:"dollar",label:"Monthly Spending"},{id:"settings",icon:"settings",label:"Settings"}];

  return(<div style={{display:"flex",height:"100vh",background:C.bg,overflow:"hidden"}}>
    <div style={{width:sideOpen?240:56,minWidth:sideOpen?240:56,background:C.sidebar,color:"#fff",display:"flex",flexDirection:"column",transition:"width .2s,min-width .2s",overflow:"hidden",zIndex:20}}>
      <div style={{display:"flex",alignItems:"center",gap:10,padding:"18px 14px 14px",borderBottom:"1px solid #1E2D4A",minHeight:56}}>
        <button onClick={()=>setSideOpen(!sideOpen)} style={{background:"none",border:"none",color:"#94A3B8",cursor:"pointer",padding:4}}><Ic name="menu" size={20}/></button>
        {sideOpen&&<span style={{fontWeight:700,fontSize:15,whiteSpace:"nowrap",letterSpacing:-.3,color:"#E2E8F0"}}>Ortho Supply Tracker</span>}
      </div>
      <nav style={{flex:1,padding:"8px 6px"}}>{NAV.map(n=>(<button key={n.id} onClick={()=>setPage(n.id)} style={{display:"flex",alignItems:"center",gap:10,width:"100%",padding:"10px 12px",borderRadius:8,border:"none",cursor:"pointer",marginBottom:2,background:page===n.id?C.sideActive:"transparent",color:page===n.id?"#fff":"#94A3B8",fontSize:13,fontWeight:page===n.id?600:400,transition:"all .15s",textAlign:"left"}}><Ic name={n.icon} size={18}/>{sideOpen&&<span style={{whiteSpace:"nowrap"}}>{n.label}</span>}</button>))}</nav>
      {sideOpen&&<div style={{padding:"12px 14px",borderTop:"1px solid #1E2D4A",fontSize:11,color:"#64748B"}}>v3.0</div>}
    </div>
    <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
      <header style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"0 24px",height:56,background:C.card,borderBottom:`1px solid ${C.border}`,flexShrink:0}}>
        <h1 style={{fontSize:17,fontWeight:700}}>{NAV.find(n=>n.id===page)?.label}</h1>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <div style={{display:"flex",borderRadius:8,overflow:"hidden",border:`1px solid ${C.border}`}}>{["All","Suwanee","Tucker"].map(l=>(<button key={l} onClick={()=>setLoc(l)} style={{padding:"6px 14px",fontSize:12,fontWeight:500,border:"none",cursor:"pointer",background:loc===l?C.accent:"#fff",color:loc===l?"#fff":C.textMuted}}>{l}</button>))}</div>
          <div style={{position:"relative"}}><Ic name="bell" size={20} color={alerts.length>0?C.danger:C.textMuted}/>{alerts.length>0&&<span style={{position:"absolute",top:-4,right:-6,background:C.danger,color:"#fff",fontSize:10,fontWeight:700,borderRadius:99,padding:"1px 5px"}}>{alerts.length}</span>}</div>
        </div>
      </header>
      <main style={{flex:1,overflow:"auto",padding:24}}>
        {page==="dashboard"&&<Dashboard inv={inv} alerts={alerts} orders={fOrders} setModal={setModal}/>}
        {page==="clinical"&&<SupplyTable inv={inv.filter(i=>i.type==="clinical")} type="clinical" setModal={setModal} h={h} getLastOrder={getLastOrder} vendors={data.vendors}/>}
        {page==="office"&&<SupplyTable inv={inv.filter(i=>i.type==="office")} type="office" setModal={setModal} h={h} getLastOrder={getLastOrder} vendors={data.vendors}/>}
        {page==="orders"&&<OrderHistory orders={fOrders} setModal={setModal} h={h} data={data}/>}
        {page==="analytics"&&<Analytics inv={inv} data={data} loc={loc}/>}
        {page==="spending"&&<Spending orders={fOrders}/>}
        {page==="settings"&&<SettingsPage eCSV={exportCSV} eJSON={exportJSON} iJSON={importJSON} clearAll={clearAll} data={data} h={h}/>}
      </main>
    </div>
    {modal&&<Modal modal={modal} setModal={setModal} data={data} loc={loc} h={h}/>}
    {toast&&<div style={{position:"fixed",bottom:24,right:24,background:toast.type==="success"?C.success:C.danger,color:"#fff",padding:"12px 20px",borderRadius:10,fontSize:13,fontWeight:500,boxShadow:"0 8px 24px rgba(0,0,0,.18)",zIndex:999,display:"flex",alignItems:"center",gap:8,animation:"slideUp .3s ease"}}><Ic name="checkcircle" size={16} color="#fff"/>{toast.msg}</div>}
  </div>);
}

function Dashboard({inv,alerts,orders,setModal}){
  const tItems=inv.length,lowC=alerts.filter(a=>a.status==="low").length;
  const pend=orders.filter(o=>o.status==="ordered").length;
  const iss=orders.filter(o=>["returned","incomplete","wrong"].includes(o.status)).length;
  const tm=orders.filter(o=>o.ordered_date?.startsWith(new Date().toISOString().slice(0,7)));
  const ms=tm.reduce((s,o)=>s+o.total_cost,0);
  const stats=[{l:"Total Items",v:tItems,icon:"package",c:C.accent,bg:C.accentLight},{l:"Low Stock",v:lowC,icon:"alert",c:C.warning,bg:C.warningBg},{l:"Pending",v:pend,icon:"clock",c:C.blue,bg:C.blueBg},{l:"Issues",v:iss,icon:"xcircle",c:C.danger,bg:C.dangerBg}];
  return(<div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(180px,1fr))",gap:16,marginBottom:24}}>{stats.map((s,i)=>(<div key={i} style={{background:C.card,borderRadius:12,padding:"20px 18px",border:`1px solid ${C.border}`,display:"flex",alignItems:"center",gap:14}}><div style={{width:44,height:44,borderRadius:10,background:s.bg,display:"flex",alignItems:"center",justifyContent:"center"}}><Ic name={s.icon} size={20} color={s.c}/></div><div><div style={{fontSize:22,fontWeight:700}}>{s.v}</div><div style={{fontSize:12,color:C.textMuted}}>{s.l}</div></div></div>))}</div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:24}}>
      <button onClick={()=>setModal({type:"logOrder"})} style={{background:`linear-gradient(135deg,${C.accent},${C.accentDark})`,border:"none",borderRadius:12,padding:24,cursor:"pointer",textAlign:"left",color:"#fff"}}><Ic name="cart" size={28} color="#fff" style={{marginBottom:8}}/><div style={{fontSize:16,fontWeight:700}}>Log New Order</div><div style={{fontSize:12,opacity:.85,marginTop:4}}>Record a supply order</div></button>
      <button onClick={()=>setModal({type:"markReceived"})} style={{background:"linear-gradient(135deg,#3B82F6,#2563EB)",border:"none",borderRadius:12,padding:24,cursor:"pointer",textAlign:"left",color:"#fff"}}><Ic name="packcheck" size={28} color="#fff" style={{marginBottom:8}}/><div style={{fontSize:16,fontWeight:700}}>Mark Received</div><div style={{fontSize:12,opacity:.85,marginTop:4}}>Update pending order</div></button>
    </div>
    {alerts.length>0&&<div style={{background:C.card,borderRadius:12,border:`1px solid ${C.border}`,padding:20,marginBottom:24}}><div style={{display:"flex",alignItems:"center",gap:8,marginBottom:14}}><Ic name="alert" size={18} color={C.warning}/><h3 style={{fontSize:15,fontWeight:700}}>Reorder Alerts ({alerts.length})</h3></div><div style={{maxHeight:260,overflow:"auto"}}><table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}><thead><tr style={{borderBottom:`2px solid ${C.border}`}}>{["Item","Category","Location","Qty","Threshold","Status"].map(h=>(<th key={h} style={{textAlign:"left",padding:"8px 10px",fontWeight:600,color:C.textMuted,fontSize:11,textTransform:"uppercase"}}>{h}</th>))}</tr></thead><tbody>{alerts.slice(0,10).map((a,i)=>(<tr key={i} style={{borderBottom:`1px solid ${C.border}`}}><td style={{padding:10}}>{a.name}</td><td style={{padding:10,color:C.textMuted}}>{a.category}</td><td style={{padding:10,color:C.textMuted}}>{a.location}</td><td style={{padding:10,fontWeight:600}}>{a.quantity}</td><td style={{padding:10,color:C.textMuted}}>{a.reorder_threshold}</td><td style={{padding:10}}><Badge status={a.status}/></td></tr>))}</tbody></table></div></div>}

// ─── Analytics ───────────────────────────────────────────────────────
function Analytics({inv,data,loc}){
  const[sortBy,setSortBy]=useState("urgency");const[typeF,setTypeF]=useState("All");
  
  // Build analytics for each unique item across locations
  const analytics=useMemo(()=>{
    const items=inv.map(item=>{
      // Get all received orders for this item+location
      const orders=data.orders.filter(o=>o.item_id===item.id&&o.location===item.location&&o.status==="received"&&o.received_date).sort((a,b)=>a.received_date.localeCompare(b.received_date));
      const allOrders=data.orders.filter(o=>o.item_id===item.id&&o.location===item.location).sort((a,b)=>b.ordered_date.localeCompare(a.ordered_date));
      const lastOrder=allOrders[0]||null;
      const lastReceived=orders.length>0?orders[orders.length-1]:null;
      const vendor=lastOrder?data.vendors.find(v=>v.id===lastOrder.vendor_id)?.name:null;
      
      // Calculate usage rate from most recent received order
      let dailyUsage=null;let daysLeft=null;let reorderDate=null;let estDuration=null;
      if(lastReceived){
        const daysSinceRcv=daysAgo(lastReceived.received_date);
        if(daysSinceRcv>0){
          const consumed=lastReceived.quantity-item.quantity;
          if(consumed>0){
            dailyUsage=+(consumed/daysSinceRcv).toFixed(2);
            daysLeft=dailyUsage>0?Math.round(item.quantity/dailyUsage):null;
            // Reorder when stock hits threshold
            const daysToThreshold=dailyUsage>0?Math.round((item.quantity-item.reorder_threshold)/dailyUsage):null;
            if(daysToThreshold!==null){
              const rd=new Date();rd.setDate(rd.getDate()+Math.max(0,daysToThreshold));
              reorderDate=rd.toISOString().slice(0,10);
            }
          }
          // Estimated duration = how long the last order lasted / would last
          if(dailyUsage>0)estDuration=Math.round(lastReceived.quantity/dailyUsage);
        }
      }
      
      // Order frequency (average days between orders)
      let avgFreq=null;
      if(allOrders.length>=2){
        const dates=allOrders.map(o=>new Date(o.ordered_date).getTime()).sort((a,b)=>a-b);
        let totalGap=0;
        for(let i=1;i<dates.length;i++)totalGap+=dates[i]-dates[i-1];
        avgFreq=Math.round(totalGap/((dates.length-1)*864e5));
      }
      
      // Last unit price
      const lastUP=lastOrder&&lastOrder.quantity>0&&lastOrder.subtotal?+(lastOrder.subtotal/lastOrder.quantity).toFixed(2):null;
      
      // Urgency score (lower = more urgent)
      const urgency=daysLeft!==null?daysLeft:(item.quantity<=0?-1:9999);
      
      return{...item,dailyUsage,daysLeft,reorderDate,estDuration,avgFreq,lastOrder,lastUP,vendor,urgency,totalOrders:allOrders.length};
    });
    
    // Filter
    let filtered=typeF==="All"?items:items.filter(i=>i.type===typeF);
    
    // Sort
    if(sortBy==="urgency")filtered.sort((a,b)=>a.urgency-b.urgency);
    else if(sortBy==="name")filtered.sort((a,b)=>a.name.localeCompare(b.name));
    else if(sortBy==="usage")filtered.sort((a,b)=>(b.dailyUsage||0)-(a.dailyUsage||0));
    else if(sortBy==="frequency")filtered.sort((a,b)=>(a.avgFreq||9999)-(b.avgFreq||9999));
    
    return filtered;
  },[inv,data,loc,sortBy,typeF]);
  
  const needsReorder=analytics.filter(i=>i.daysLeft!==null&&i.daysLeft<=14);
  const noData=analytics.filter(i=>i.totalOrders===0);

  if(inv.length===0)return<div style={{background:C.card,borderRadius:12,border:`2px dashed ${C.border}`,padding:48,textAlign:"center"}}><Ic name="analytics" size={40} color={C.textMuted} style={{marginBottom:12}}/><div style={{fontSize:16,fontWeight:600}}>No data yet</div><div style={{fontSize:13,color:C.textMuted,marginTop:6}}>Add items and log orders to see usage analytics.</div></div>;

  return(<div>
    {/* Summary cards */}
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(200px,1fr))",gap:16,marginBottom:24}}>
      <div style={{background:C.card,borderRadius:12,padding:"20px 18px",border:`1px solid ${C.border}`,display:"flex",alignItems:"center",gap:14}}><div style={{width:44,height:44,borderRadius:10,background:C.dangerBg,display:"flex",alignItems:"center",justifyContent:"center"}}><Ic name="alert" size={20} color={C.danger}/></div><div><div style={{fontSize:22,fontWeight:700}}>{needsReorder.length}</div><div style={{fontSize:12,color:C.textMuted}}>Reorder Within 14d</div></div></div>
      <div style={{background:C.card,borderRadius:12,padding:"20px 18px",border:`1px solid ${C.border}`,display:"flex",alignItems:"center",gap:14}}><div style={{width:44,height:44,borderRadius:10,background:C.accentLight,display:"flex",alignItems:"center",justifyContent:"center"}}><Ic name="analytics" size={20} color={C.accent}/></div><div><div style={{fontSize:22,fontWeight:700}}>{analytics.filter(i=>i.dailyUsage!==null).length}</div><div style={{fontSize:12,color:C.textMuted}}>Items Tracked</div></div></div>
      <div style={{background:C.card,borderRadius:12,padding:"20px 18px",border:`1px solid ${C.border}`,display:"flex",alignItems:"center",gap:14}}><div style={{width:44,height:44,borderRadius:10,background:C.warningBg,display:"flex",alignItems:"center",justifyContent:"center"}}><Ic name="clock" size={20} color={C.warning}/></div><div><div style={{fontSize:22,fontWeight:700}}>{noData.length}</div><div style={{fontSize:12,color:C.textMuted}}>Need Order Data</div></div></div>
    </div>

    {/* Reorder alerts */}
    {needsReorder.length>0&&<div style={{background:"#FEF2F2",borderRadius:12,border:`1px solid #FECACA`,padding:16,marginBottom:20}}>
      <div style={{fontWeight:700,fontSize:14,color:C.danger,marginBottom:8}}><Ic name="alert" size={16} color={C.danger} style={{marginRight:6}}/>Projected Reorders (Next 14 Days)</div>
      <div style={{display:"flex",flexWrap:"wrap",gap:8}}>{needsReorder.map((item,i)=>(<div key={i} style={{background:"#fff",borderRadius:8,padding:"8px 12px",fontSize:12,border:"1px solid #FECACA"}}>
        <div style={{fontWeight:600}}>{item.name}</div>

        <thead><tr style={{borderBottom:`2px solid ${C.border}`}}>{["Item","Location","Stock","Daily Usage","Days Left","Est. Duration","Reorder By","Avg Order Freq","Last Price","Last Vendor","Orders"].map(t=>(<th key={t} style={{textAlign:"left",padding:"10px 10px",fontWeight:600,color:C.textMuted,fontSize:10,textTransform:"uppercase",whiteSpace:"nowrap"}}>{t}</th>))}</tr></thead>
        <tbody>{analytics.map((item,i)=>{
          const urgColor=item.daysLeft===null?C.textMuted:item.daysLeft<=0?C.danger:item.daysLeft<=7?C.danger:item.daysLeft<=14?C.warning:item.daysLeft<=30?C.blue:C.success;
          return(<tr key={i} style={{borderBottom:`1px solid ${C.border}`}} onMouseEnter={e=>e.currentTarget.style.background="#F8FAFC"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>

            <td style={{padding:"10px"}}>{item.dailyUsage!==null?<span style={{fontWeight:500}}>{item.dailyUsage}/{item.unit?.split("/")[0]||"d"}</span>:<span style={{color:C.textMuted,fontStyle:"italic"}}>—</span>}</td>
            <td style={{padding:"10px"}}>{item.daysLeft!==null?<span style={{fontWeight:700,color:urgColor,fontSize:13}}>{item.daysLeft<=0?"0":item.daysLeft}d</span>:<span style={{color:C.textMuted}}>—</span>}</td>
            <td style={{padding:"10px"}}>{item.estDuration?<span>{item.estDuration}d <span style={{fontSize:10,color:C.textMuted}}>per order</span></span>:<span style={{color:C.textMuted}}>—</span>}</td>
            <td style={{padding:"10px"}}>{item.reorderDate?<span style={{fontWeight:500,color:urgColor}}>{item.reorderDate}</span>:<span style={{color:C.textMuted}}>—</span>}</td>
            <td style={{padding:"10px"}}>{item.avgFreq?<span>{item.avgFreq}d</span>:<span style={{color:C.textMuted}}>—</span>}</td>
            <td style={{padding:"10px"}}>{item.lastUP?`$${item.lastUP}`:<span style={{color:C.textMuted}}>—</span>}</td>
            <td style={{padding:"10px",color:C.textMuted,fontSize:11}}>{item.vendor||"—"}</td>
            <td style={{padding:"10px",color:C.textMuted}}>{item.totalOrders}</td>
          </tr>)})}</tbody>
      </table>
      {analytics.length===0&&<div style={{padding:40,textAlign:"center",color:C.textMuted}}>No items match</div>}
    </div>
    
    <div style={{marginTop:16,padding:14,background:"#F1F5F9",borderRadius:10,fontSize:12,color:C.textMuted,lineHeight:1.6}}>
      <strong>How projections work:</strong> Usage rate is calculated from your last received order — (qty received - current stock) ÷ days since received. "Days Left" = current stock ÷ daily usage. "Reorder By" = when stock will hit your threshold. More orders logged = more accurate projections. Items showing "—" need at least one received order to calculate.
    </div>
  </div>);
}

function Spending({orders}){
  const rcv=orders.filter(o=>o.status==="received");
  const md=useMemo(()=>{const m={};rcv.forEach(o=>{const mo=o.ordered_date.slice(0,7);if(!m[mo])m[mo]={month:mo,clinical:0,office:0};m[mo][o.type]+=o.total_cost});return Object.values(m).sort((a,b)=>a.month.localeCompare(b.month)).map(d=>({...d,clinical:+d.clinical.toFixed(2),office:+d.office.toFixed(2),label:new Date(d.month+"-01").toLocaleDateString("en-US",{month:"short",year:"numeric"})}))},[rcv]);
  const tc=rcv.filter(o=>o.type==="clinical").reduce((s,o)=>s+o.total_cost,0);const to=rcv.filter(o=>o.type==="office").reduce((s,o)=>s+o.total_cost,0);
  const pd=[{name:"Clinical",value:+tc.toFixed(2)},{name:"Office",value:+to.toFixed(2)}];const CL=[C.accent,"#3B82F6"];
  const cb=useMemo(()=>{const m={};rcv.forEach(o=>{if(!m[o.category])m[o.category]=0;m[o.category]+=o.total_cost});return Object.entries(m).sort((a,b)=>b[1]-a[1]).slice(0,10).map(([n,v])=>({name:n,value:+v.toFixed(2)}))},[rcv]);
  if(rcv.length===0)return<div style={{background:C.card,borderRadius:12,border:`2px dashed ${C.border}`,padding:48,textAlign:"center"}}><div style={{fontSize:15,fontWeight:600}}>No spending data yet</div><div style={{fontSize:13,color:C.textMuted,marginTop:6}}>Charts appear once you have received orders.</div></div>;
  return(<div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:24}}>
      <div style={{background:C.card,borderRadius:12,border:`1px solid ${C.border}`,padding:20}}><h3 style={{fontSize:15,fontWeight:700,marginBottom:16}}>Monthly Trend</h3><ResponsiveContainer width="100%" height={260}><BarChart data={md}><CartesianGrid strokeDasharray="3 3" stroke={C.border}/><XAxis dataKey="label" tick={{fontSize:11}} stroke={C.textMuted}/><YAxis tick={{fontSize:11}} stroke={C.textMuted} tickFormatter={v=>`$${v}`}/><Tooltip formatter={v=>`$${v.toFixed(2)}`}/><Bar dataKey="clinical" name="Clinical" fill={C.accent} radius={[4,4,0,0]}/><Bar dataKey="office" name="Office" fill="#3B82F6" radius={[4,4,0,0]}/><Legend wrapperStyle={{fontSize:12}}/></BarChart></ResponsiveContainer></div>
      <div style={{background:C.card,borderRadius:12,border:`1px solid ${C.border}`,padding:20}}><h3 style={{fontSize:15,fontWeight:700,marginBottom:16}}>Clinical vs Office</h3><ResponsiveContainer width="100%" height={260}><PieChart><Pie data={pd} cx="50%" cy="50%" outerRadius={90} innerRadius={50} dataKey="value" label={({name,percent})=>`${name} ${(percent*100).toFixed(0)}%`} labelLine={false}>{pd.map((e,i)=><Cell key={i} fill={CL[i]}/>)}</Pie><Tooltip formatter={v=>`$${v.toFixed(2)}`}/></PieChart></ResponsiveContainer><div style={{display:"flex",justifyContent:"center",gap:24,marginTop:8}}><div style={{textAlign:"center"}}><div style={{fontSize:10,color:C.textMuted,fontWeight:600}}>CLINICAL</div><div style={{fontSize:16,fontWeight:700,color:C.accent}}>${tc.toFixed(2)}</div></div><div style={{textAlign:"center"}}><div style={{fontSize:10,color:C.textMuted,fontWeight:600}}>OFFICE</div><div style={{fontSize:16,fontWeight:700,color:"#3B82F6"}}>${to.toFixed(2)}</div></div></div></div>
    </div>
    <div style={{background:C.card,borderRadius:12,border:`1px solid ${C.border}`,padding:20}}><h3 style={{fontSize:15,fontWeight:700,marginBottom:16}}>Top Categories</h3><ResponsiveContainer width="100%" height={280}><BarChart data={cb} layout="vertical" margin={{left:120}}><CartesianGrid strokeDasharray="3 3" stroke={C.border}/><XAxis type="number" tick={{fontSize:11}} stroke={C.textMuted} tickFormatter={v=>`$${v}`}/><YAxis type="category" dataKey="name" tick={{fontSize:11}} stroke={C.textMuted} width={110}/><Tooltip formatter={v=>`$${v.toFixed(2)}`}/><Bar dataKey="value" fill={C.accent} radius={[0,4,4,0]}/></BarChart></ResponsiveContainer></div>
  </div>);
}

      {data.vendors.length===0?<div style={{fontSize:13,color:C.textMuted,textAlign:"center",padding:16}}>No vendors yet</div>:<div style={{maxHeight:200,overflow:"auto"}}>{data.vendors.map(v=>(<div key={v.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"8px 0",borderBottom:`1px solid ${C.border}`}}>{editVId===v.id?<div style={{display:"flex",gap:6,flex:1,alignItems:"center"}}><input value={editVN} onChange={e=>setEditVN(e.target.value)} style={{...inpSm,flex:1}}/><button onClick={()=>{h.updateVendor(v.id,editVN);setEditVId(null)}} style={btnSm(C.success,"#fff")}><Ic name="save" size={12} color="#fff"/></button><button onClick={()=>setEditVId(null)} style={btnSm("#E2E5EB",C.text)}><Ic name="x" size={12}/></button></div>:<div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flex:1}}><span style={{fontSize:13}}>{v.name}</span><div style={{display:"flex",gap:4}}><button onClick={()=>{setEditVId(v.id);setEditVN(v.name)}} style={btnSm(C.blueBg,C.blue)}><Ic name="pencil" size={11} color={C.blue}/></button><button onClick={()=>h.deleteVendor(v.id)} style={btnSm(C.dangerBg,C.danger)}><Ic name="trash" size={11} color={C.danger}/></button></div></div>}</div>))}</div>}
    </div>
    <div style={{background:C.card,borderRadius:12,border:`1px solid ${C.border}`,padding:24,marginBottom:20}}>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:16}}><Ic name="filedown" size={18} color={C.accent}/><h3 style={{fontSize:15,fontWeight:700}}>Backup & Restore</h3></div>
      <div style={{display:"flex",gap:10,marginBottom:12}}><button onClick={eJSON} style={{flex:1,padding:12,borderRadius:8,border:`1px solid ${C.border}`,background:"#fff",fontSize:13,fontWeight:500,cursor:"pointer"}}>Export JSON</button><button onClick={()=>fileRef.current?.click()} style={{flex:1,padding:12,borderRadius:8,border:`1px solid ${C.border}`,background:"#fff",fontSize:13,fontWeight:500,cursor:"pointer"}}>Import JSON</button><input ref={fileRef} type="file" accept=".json" style={{display:"none"}} onChange={e=>{if(e.target.files[0])iJSON(e.target.files[0]);e.target.value=""}}/></div>
      <div style={{display:"flex",gap:10}}><button onClick={()=>eCSV("inventory")} style={{flex:1,padding:8,borderRadius:8,border:`1px solid ${C.border}`,background:"#fff",fontSize:12,cursor:"pointer"}}>Inventory CSV</button><button onClick={()=>eCSV("orders")} style={{flex:1,padding:8,borderRadius:8,border:`1px solid ${C.border}`,background:"#fff",fontSize:12,cursor:"pointer"}}>Orders CSV</button></div>
    </div>
    <div style={{background:C.card,borderRadius:12,border:`1px solid ${C.danger}30`,padding:24}}>

function Modal({modal,setModal,data,loc,h}){
  const[form,setForm]=useState(()=>{
    if(modal.type==="logOrder")return{item_id:"",quantity:1,location:loc==="All"?"Suwanee":loc,notes:"",tax:0,shipping:0,discount:0,vendor_id:"",newVendor:"",ordered_date:new Date().toISOString().slice(0,10),unit_price:"",subtotal_input:"",price_mode:""};
    if(modal.type==="addItem")return{name:"",category:"",unit:"",itemLoc:loc==="All"?"Both":loc};
    return{};
  });
  const[showNewV,setShowNewV]=useState(false);
  const pending=data.orders.filter(o=>o.status==="ordered"&&(loc==="All"||o.location===loc));

  if(modal.type==="addItem"){
    const cats=modal.itemType==="clinical"?["Brackets","Wires","Bands","Elastics","Bonding Adhesive","Separators","Retainer Materials","Cheek Retractors","Ligature Ties","Archwires","Debonding Burs","Cheek Cushions","Disposables","Anesthesia"]:["Wipes","Towels","Cleaning Products","Sterilization Supplies","Patient Amenities"];
    return<MW t={`Add ${modal.itemType==="clinical"?"Clinical":"Office"} Item`} onClose={()=>setModal(null)}>
      <label style={lbl}>Item Name</label><input value={form.name} onChange={e=>setForm({...form,name:e.target.value})} style={{...inp,marginBottom:12}} placeholder="e.g. Bracket Removal Plier"/>
      <label style={lbl}>Category</label><select value={form.category} onChange={e=>setForm({...form,category:e.target.value})} style={{...inp,marginBottom:12}}><option value="">Select...</option>{cats.map(c=><option key={c}>{c}</option>)}</select>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
        <div><label style={lbl}>Unit</label><input value={form.unit} onChange={e=>setForm({...form,unit:e.target.value})} style={inp} placeholder="e.g. pack/10, syringe"/></div>
        <div><label style={lbl}>Location</label><select value={form.itemLoc} onChange={e=>setForm({...form,itemLoc:e.target.value})} style={inp}><option value="Both">Both Locations</option><option value="Suwanee">Suwanee Only</option><option value="Tucker">Tucker Only</option></select></div>
      </div>
      <button disabled={!form.name||!form.category||!form.unit} onClick={()=>h.addItem({name:form.name,category:form.category,type:modal.itemType,unit:form.unit,cost_per_unit:0},form.itemLoc)} style={{width:"100%",padding:10,borderRadius:8,border:"none",background:(form.name&&form.category&&form.unit)?C.accent:"#CBD5E1",color:"#fff",fontSize:14,fontWeight:600,cursor:(form.name&&form.category&&form.unit)?"pointer":"not-allowed"}}>Add Item</button>
    </MW>}

  if(modal.type==="updateStock")return<MW t="Update Stock" onClose={()=>setModal(null)}><div style={{marginBottom:12}}><div style={{fontWeight:600,marginBottom:4}}>{modal.item.name}</div><div style={{fontSize:12,color:C.textMuted}}>{modal.item.location} · Current: {modal.item.quantity} {modal.item.unit}</div></div><label style={lbl}>New Quantity</label><input type="number" defaultValue={modal.item.quantity} id="nq" style={{...inp,marginBottom:16}}/><button onClick={()=>h.updateStock(modal.item.id,modal.item.location,Math.max(0,+document.getElementById("nq").value))} style={{width:"100%",padding:10,borderRadius:8,border:"none",background:C.accent,color:"#fff",fontSize:14,fontWeight:600,cursor:"pointer"}}>Update</button></MW>;

  if(modal.type==="markReceived")return<MW t="Mark Received" onClose={()=>setModal(null)}>{pending.length===0?<div style={{textAlign:"center",padding:20,color:C.textMuted}}>No pending orders</div>:<div style={{maxHeight:400,overflow:"auto"}}>{pending.map(o=>(<ReceiveRow key={o.id} o={o} h={h} setModal={setModal}/>))}</div>}</MW>;

  if(modal.type==="markReceivedOne"){const o=modal.order;return<MW t="Mark as Received" onClose={()=>setModal(null)}><ReceiveRow o={o} h={h} setModal={setModal} expanded/></MW>}

  const sel=data.items.find(i=>i.id===+form.item_id);
  // Sync: if user typed subtotal, calc unit price. If user typed unit price, calc subtotal.
  const effectiveUP=form.price_mode==="subtotal"&&form.quantity>0?+(+form.subtotal_input/form.quantity).toFixed(2):(+form.unit_price||0);
  const sub=form.price_mode==="subtotal"?(+form.subtotal_input||0):sel?+(form.quantity*effectiveUP).toFixed(2):0;
  const tot=+(+sub+(+form.tax||0)+(+form.shipping||0)-(+form.discount||0)).toFixed(2);
  const lo=sel?data.orders.filter(o=>o.item_id===sel.id&&o.location===form.location).sort((a,b)=>b.ordered_date.localeCompare(a.ordered_date))[0]:null;
  const lv=lo?data.vendors.find(v=>v.id===lo.vendor_id)?.name:null;
  const lastUP=lo&&lo.quantity>0?+(lo.subtotal/lo.quantity).toFixed(2):null;

  return<MW t="Log New Order" onClose={()=>setModal(null)}>
    {data.items.length===0?<div style={{textAlign:"center",padding:20,color:C.textMuted}}>Add items in Clinical or Office Supplies first.</div>:<>
      <label style={lbl}>Item</label>
      <select value={form.item_id} onChange={e=>{const newId=e.target.value;const newSel=data.items.find(i=>i.id===+newId);const newLo=newSel?data.orders.filter(o=>o.item_id===newSel.id&&o.location===form.location).sort((a,b)=>b.ordered_date.localeCompare(a.ordered_date))[0]:null;const newUP=newLo&&newLo.quantity>0?+(newLo.subtotal/newLo.quantity).toFixed(2):"";const newSub=newUP&&form.quantity?+(form.quantity*newUP).toFixed(2):"";setForm({...form,item_id:newId,unit_price:newUP,subtotal_input:newSub,price_mode:newUP?"unit":""})}} style={{...inp,marginBottom:4}}><option value="">Select...</option>{[...data.items].sort((a,b)=>a.name.localeCompare(b.name)).map(i=>(<option key={i.id} value={i.id}>{i.name} ({i.category})</option>))}</select>
      {lo&&<div style={{padding:10,background:"#FFF7ED",borderRadius:8,fontSize:11,color:"#92400E",marginBottom:12,marginTop:4}}><strong>Last:</strong> {lo.ordered_date} ({daysAgo(lo.ordered_date)}d ago) · {lo.quantity} {lo.unit||""} · ${lo.total_cost.toFixed(2)} · ${lastUP}/ea{lv&&` · ${lv}`}</div>}
      {sel&&!lo&&<div style={{fontSize:11,color:C.textMuted,marginBottom:12,marginTop:4,fontStyle:"italic"}}>No previous orders at {form.location}</div>}
      {!sel&&<div style={{marginBottom:8}}/>}

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:8}}>
        <div><label style={lbl}>Qty {sel&&<span style={{fontWeight:400,color:C.accent}}>({sel.unit})</span>}</label><input type="number" value={form.quantity} min={1} onChange={e=>{const q=Math.max(1,+e.target.value);if(form.price_mode==="subtotal"&&form.subtotal_input){setForm({...form,quantity:q,unit_price:q>0?+(+form.subtotal_input/q).toFixed(2):""})}else if(form.unit_price){setForm({...form,quantity:q,subtotal_input:+(q*(+form.unit_price)).toFixed(2)})}else{setForm({...form,quantity:q})}}} style={inp}/></div>
        <div><label style={lbl}>Unit Price ($) {form.price_mode==="subtotal"&&effectiveUP>0&&<span style={{fontWeight:400,color:C.accent}}>= ${effectiveUP}</span>}</label><input type="number" step=".01" value={form.price_mode==="subtotal"?"":form.unit_price} onChange={e=>{const up=e.target.value;const st=up&&form.quantity?+(form.quantity*(+up)).toFixed(2):"";setForm({...form,unit_price:up,subtotal_input:st,price_mode:"unit"})}} style={{...inp,background:form.price_mode==="subtotal"?"#F1F5F9":"#fff"}} placeholder={lastUP?`Last: $${lastUP}`:"0.00"}/></div>
        <div><label style={lbl}>or Subtotal ($) {form.price_mode==="unit"&&+sub>0&&<span style={{fontWeight:400,color:C.accent}}>= ${(+sub).toFixed(2)}</span>}</label><input type="number" step=".01" value={form.price_mode==="unit"?"":form.subtotal_input} onChange={e=>{const st=e.target.value;const up=st&&form.quantity>0?+(+st/form.quantity).toFixed(2):"";setForm({...form,subtotal_input:st,unit_price:up,price_mode:"subtotal"})}} style={{...inp,background:form.price_mode==="unit"?"#F1F5F9":"#fff"}} placeholder="Total before tax"/></div>
      </div>
      <div style={{fontSize:10,color:C.textMuted,marginBottom:12,fontStyle:"italic"}}>Fill either Unit Price or Subtotal — the other calculates automatically</div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
        <div><label style={lbl}>Location</label><select value={form.location} onChange={e=>{const newLo2=sel?data.orders.filter(o=>o.item_id===sel.id&&o.location===e.target.value).sort((a,b)=>b.ordered_date.localeCompare(a.ordered_date))[0]:null;const newUP2=newLo2&&newLo2.quantity>0?+(newLo2.subtotal/newLo2.quantity).toFixed(2):"";setForm({...form,location:e.target.value,unit_price:newUP2||form.unit_price,subtotal_input:newUP2&&form.quantity?+(form.quantity*newUP2).toFixed(2):form.subtotal_input,price_mode:newUP2?"unit":form.price_mode})}} style={inp}><option>Suwanee</option><option>Tucker</option></select></div>
        <div><label style={lbl}>Order Date</label><input type="date" value={form.ordered_date} onChange={e=>setForm({...form,ordered_date:e.target.value})} style={inp}/></div>
      </div>
      <label style={lbl}>Purchased From</label>
      {showNewV?<div style={{display:"flex",gap:6,marginBottom:12}}><input value={form.newVendor} onChange={e=>setForm({...form,newVendor:e.target.value})} placeholder="New vendor..." style={{...inp,flex:1}}/><button onClick={()=>{if(form.newVendor.trim()){const vid=h.addVendor(form.newVendor.trim());setForm(f=>({...f,vendor_id:String(vid),newVendor:""}));setShowNewV(false)}}} style={{padding:"8px 14px",borderRadius:8,border:"none",background:C.accent,color:"#fff",fontSize:12,fontWeight:600,cursor:"pointer"}}>Add</button><button onClick={()=>setShowNewV(false)} style={{padding:"8px",borderRadius:8,border:`1px solid ${C.border}`,background:"#fff",cursor:"pointer"}}><Ic name="x" size={14}/></button></div>:
      <select value={form.vendor_id} onChange={e=>{if(e.target.value==="__new__")setShowNewV(true);else setForm({...form,vendor_id:e.target.value})}} style={{...inp,marginBottom:12}}><option value="">Select vendor...</option>{data.vendors.map(v=>(<option key={v.id} value={v.id}>{v.name}</option>))}<option value="__new__">+ Add new vendor...</option></select>}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:12}}>
        <div><label style={lbl}>Tax ($)</label><input type="number" step=".01" value={form.tax} onChange={e=>setForm({...form,tax:e.target.value})} style={inp}/></div>
        <div><label style={lbl}>Shipping ($)</label><input type="number" step=".01" value={form.shipping} onChange={e=>setForm({...form,shipping:e.target.value})} style={inp}/></div>
        <div><label style={lbl}>Discount ($)</label><input type="number" step=".01" value={form.discount} onChange={e=>setForm({...form,discount:e.target.value})} style={inp}/></div>
      </div>
      <label style={lbl}>Notes</label><input value={form.notes} onChange={e=>setForm({...form,notes:e.target.value})} style={{...inp,marginBottom:16}} placeholder="Item#, PO number, details..."/>
      {sel&&+sub>0&&<div style={{padding:14,background:"#F1F5F9",borderRadius:10,fontSize:12,marginBottom:16}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span>Subtotal ({form.quantity} × ${effectiveUP.toFixed?effectiveUP.toFixed(2):effectiveUP}/{sel.unit})</span><span style={{fontWeight:600}}>${(+sub).toFixed(2)}</span></div>
        {+form.tax>0&&<div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span>Tax</span><span>${(+form.tax).toFixed(2)}</span></div>}
        {+form.shipping>0&&<div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span>Shipping</span><span>${(+form.shipping).toFixed(2)}</span></div>}
        {+form.discount>0&&<div style={{display:"flex",justifyContent:"space-between",marginBottom:4,color:C.success}}><span>Discount</span><span>-${(+form.discount).toFixed(2)}</span></div>}
        <div style={{display:"flex",justifyContent:"space-between",borderTop:`1px solid ${C.border}`,paddingTop:8,marginTop:6}}><span style={{fontWeight:700,fontSize:14}}>Total</span><span style={{fontWeight:700,fontSize:14,color:C.accent}}>${tot.toFixed(2)}</span></div>
      </div>}
      <button disabled={!form.item_id||+sub<=0} onClick={()=>{if(!sel)return;h.logOrder({item_id:sel.id,item_name:sel.name,category:sel.category,type:sel.type,unit:sel.unit,location:form.location,quantity:+form.quantity,unit_price:+effectiveUP||0,subtotal:+sub,tax:+form.tax||0,shipping:+form.shipping||0,discount:+form.discount||0,total_cost:tot,vendor_id:form.vendor_id?+form.vendor_id:null,ordered_date:form.ordered_date,notes:form.notes})}} style={{width:"100%",padding:10,borderRadius:8,border:"none",background:(form.item_id&&+sub>0)?C.accent:"#CBD5E1",color:"#fff",fontSize:14,fontWeight:600,cursor:(form.item_id&&+sub>0)?"pointer":"not-allowed"}}>Log Order — ${tot.toFixed(2)}</button>
    </>}
  </MW>;
}

function ReceiveRow({o,h,setModal,expanded}){
  const[rcvDate,setRcvDate]=useState(new Date().toISOString().slice(0,10));
  const[show,setShow]=useState(!!expanded);
  if(!show)return(<div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 0",borderBottom:`1px solid ${C.border}`}}><div><div style={{fontWeight:500,fontSize:13}}>#{o.id} — {o.item_name}</div><div style={{fontSize:11,color:C.textMuted}}>{o.location} · {o.quantity} {o.unit||""} · ${o.total_cost.toFixed(2)} · Ordered {o.ordered_date}</div></div><button onClick={()=>setShow(true)} style={{padding:"5px 14px",borderRadius:6,border:"none",background:C.success,color:"#fff",fontSize:11,fontWeight:600,cursor:"pointer"}}>Receive</button></div>);
  return(<div style={{padding:"12px 0",borderBottom:`1px solid ${C.border}`}}>
    <div style={{fontWeight:500,fontSize:13,marginBottom:8}}>#{o.id} — {o.item_name}</div>
    <div style={{fontSize:11,color:C.textMuted,marginBottom:10}}>{o.location} · {o.quantity} {o.unit||""} · ${o.total_cost.toFixed(2)} · Ordered {o.ordered_date}</div>
    <div style={{display:"flex",gap:10,alignItems:"center"}}>
      <div><label style={{...lbl,marginBottom:2}}>Date Received</label><input type="date" value={rcvDate} onChange={e=>setRcvDate(e.target.value)} style={{...inpSm,width:140}}/></div>
      <button onClick={()=>{h.markReceived(o.id,rcvDate);setModal(null)}} style={{padding:"6px 16px",borderRadius:6,border:"none",background:C.success,color:"#fff",fontSize:12,fontWeight:600,cursor:"pointer",marginTop:14}}>Confirm Received</button>
      <button onClick={()=>setShow(false)} style={{padding:"6px 10px",borderRadius:6,border:`1px solid ${C.border}`,background:"#fff",fontSize:12,cursor:"pointer",marginTop:14}}>Cancel</button>
    </div>
  </div>);
}

function MW({t,onClose,children}){return<div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,.4)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100,animation:"fadeIn .2s"}}><div onClick={e=>e.stopPropagation()} style={{background:"#fff",borderRadius:14,padding:24,width:500,maxWidth:"95vw",maxHeight:"85vh",overflow:"auto",boxShadow:"0 20px 60px rgba(0,0,0,.2)"}}><div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}><h3 style={{fontSize:16,fontWeight:700}}>{t}</h3><button onClick={onClose} style={{background:"none",border:"none",cursor:"pointer",color:C.textMuted,padding:4}}><Ic name="x" size={18}/></button></div>{children}</div></div>}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
